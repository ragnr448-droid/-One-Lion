<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR ASMAR | GRAND RP STYLE</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Tajawal:wght@400;700&display=swap');

        :root {
            --dark-panel: #0a0b10;
            --accent-color: #ff4655; /* لون جراند الشهير */
            --glow-color: rgba(255, 70, 85, 0.5);
            --text-gray: #a0a0a8;
            --sidebar-width: 260px;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #050505;
            color: white;
            margin: 0;
            overflow-x: hidden;
            background-image: radial-gradient(circle at top right, #1a1a2e, #050505);
            background-attachment: fixed;
        }

        /* الهيدر المزخرف */
        header {
            background: rgba(10, 11, 16, 0.9);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-color);
            box-shadow: 0 0 20px var(--glow-color);
        }

        .hr-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 900;
            color: white;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .hr-logo span { color: var(--accent-color); text-shadow: 0 0 10px var(--accent-color); }

        /* حاوية الموقع */
        .wrapper { display: flex; min-height: calc(100vh - 85px); }

        /* القائمة الجانبية Grand RP Style */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--dark-panel);
            padding: 30px 0;
            border-left: 1px solid #1f1f27;
        }

        .nav-item {
            padding: 15px 30px;
            display: flex;
            align-items: center;
            color: var(--text-gray);
            text-decoration: none;
            cursor: pointer;
            transition: 0.3s;
            border-right: 4px solid transparent;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .nav-item:hover, .nav-item.active {
            background: linear-gradient(to left, rgba(255, 70, 85, 0.1), transparent);
            color: white;
            border-right-color: var(--accent-color);
        }

        /* المحتوى الرئيسي */
        .main-content { flex: 1; padding: 30px; }

        .page { display: none; animation: slideUp 0.4s ease-out; }
        .page.active { display: block; }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* البطاقات */
        .stat-card {
            background: #0f1016;
            border: 1px solid #1f1f27;
            border-radius: 4px; /* زوايا حادة زي جراند */
            padding: 25px;
            margin-bottom: 25px;
        }

        .stat-card h2 { border-right: 4px solid var(--accent-color); padding-right: 15px; margin-bottom: 20px; font-size: 1.2em; text-transform: uppercase; }

        /* الجداول */
        table { width: 100%; border-collapse: collapse; background: #0a0b10; }
        th { background: #16171d; color: var(--accent-color); text-align: right; padding: 15px; font-size: 0.8em; text-transform: uppercase; border-bottom: 1px solid #1f1f27; }
        td { padding: 15px; border-bottom: 1px solid #15151b; font-size: 0.95em; }

        /* الأزرار والمدخلات */
        .admin-form { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, select, textarea {
            background: #16171d;
            border: 1px solid #2a2a35;
            color: white;
            padding: 12px;
            border-radius: 3px;
            outline: none;
        }
        input:focus { border-color: var(--accent-color); }

        .btn-grand {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 15px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            grid-column: span 2;
        }
        .btn-grand:hover { filter: brightness(1.2); box-shadow: 0 0 15px var(--glow-color); }

        /* شات الدعم */
        .chat-toggle { position: fixed; bottom: 30px; left: 30px; background: var(--accent-color); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 0 20px var(--glow-color); z-index: 1000; }
        #chat-window { position: fixed; bottom: 100px; left: 30px; width: 320px; height: 450px; background: var(--dark-panel); border: 1px solid var(--accent-color); border-radius: 8px; display: none; flex-direction: column; z-index: 1000; box-shadow: 0 0 30px black; }
        #msgs { flex: 1; padding: 15px; overflow-y: auto; }

        .status-badge { padding: 4px 10px; border-radius: 2px; font-size: 0.75em; font-weight: bold; text-transform: uppercase; }
        .bg-active { background: #00ff88; color: #000; }
        .bg-danger { background: #ff4655; color: #fff; }

        #admin-lock { display: none; }
    </style>
</head>
<body>

<header>
    <div class="hr-logo">𝓗𝓡 <span></span></div>
    <div style="text-align: left">
        <div style="font-weight: bold; font-size: 0.8em; color: var(--accent-color)">وزارة الموارد البشرية</div>
        <div id="current-time" style="font-size: 0.7em; color: var(--text-gray)"></div>
    </div>
</header>

<div class="wrapper">
    <div class="sidebar">
        <div class="nav-item active" id="n-main" onclick="openPage('main')">🏠 شؤون الموظفين</div>
        <div class="nav-item" id="n-black" onclick="openPage('black')">🚫 القائمة السوداء</div>
        <div class="nav-item" onclick="askAdmin()">🔐 لوحة التحكم (ADMIN)</div>
        <div class="nav-item" style="margin-top: 50px; color: var(--accent-color); font-size: 0.7em;">المبرمج: ASMAR</div>
    </div>

    <div class="main-content">
        <div id="p-main" class="page active">
            <div id="admin-lock" class="stat-card">
                <h2>إضافة بيانات جديدة</h2>
                <div class="admin-form">
                    <input type="text" id="name" placeholder="الاسم الرباعي">
                    <select id="sector" onchange="loadRanks()">
                        <option value="">اختر القطاع</option>
                        <option value="عسكري">🎖️ القطاع العسكري</option>
                        <option value="طبي">🏥 التحالف الطبي</option>
                        <option value="حكومي">🏛️ القطاع الحكومي</option>
                    </select>
                    <select id="rank"><option>الرتبة</option></select>
                    <select id="status" onchange="toggleInputs()">
                        <option value="نشط">متواجد (نشط)</option>
                        <option value="استقالة">استقالة</option>
                        <option value="فصل">فصل نهائي</option>
                    </select>
                    <div id="penalty-area" style="display:none; grid-column: span 2;">
                        <textarea id="reason" placeholder="سبب الإجراء..." rows="3"></textarea>
                        <div class="admin-form" style="margin-top:10px;">
                            <input type="text" id="punish" placeholder="العقوبة المطبقة">
                            <input type="number" id="timer" placeholder="فترة التهدئة (أيام)">
                        </div>
                    </div>
                    <button class="btn-grand" onclick="uploadData()">إرسال للبيانات السحابية</button>
                </div>
            </div>

            <div class="stat-card">
                <h2>سجل القوى العاملة النشطة</h2>
                <table>
                    <thead>
                        <tr><th>الاسم</th><th>القطاع</th><th>الرتبة</th><th>الحالة</th><th>التاريخ</th></tr>
                    </thead>
                    <tbody id="home-data"></tbody>
                </table>
            </div>
        </div>

        <div id="p-black" class="page">
            <div class="stat-card" style="border-right: 5px solid var(--accent-color);">
                <h2 style="color: var(--accent-color)">BLACKLIST | القائمة السوداء</h2>
                <table>
                    <thead>
                        <tr><th>الاسم</th><th>الحالة</th><th>السبب</th><th>العقوبة</th><th>التهدئة</th><th>الإجراء</th></tr>
                    </thead>
                    <tbody id="black-data"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="chat-toggle" onclick="toggleChat()">💬</div>
<div id="chat-window">
    <div style="background:var(--accent-color); padding:15px; font-weight:bold;">دعم المبرمج ASMAR</div>
    <div id="msgs"></div>
    <div style="display:flex; border-top:1px solid #1f1f27;">
        <input type="text" id="mText" placeholder="رسالتك..." style="flex:1; border:none; background:transparent;">
        <button onclick="sendMsg()" style="background:var(--accent-color); border:none; color:white; padding:10px;">إرسال</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDP8F9r4h7pzhl3FV9-eR-6uC9R4W80mE",
        authDomain: "hr-asmar.firebaseapp.com",
        databaseURL: "https://hr-asmar-default-rtdb.firebaseio.com",
        projectId: "hr-asmar",
        storageBucket: "hr-asmar.firebasestorage.app",
        messagingSenderId: "642339321351",
        appId: "1:642339321351:web:28780333d7b819f798ec4b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let root = false;

    function openPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('p-' + id).classList.add('active');
        document.getElementById('n-' + id).classList.add('active');
    }

    function askAdmin() {
        if(prompt("PASSWORD:") === "asmar123") {
            root = true; document.getElementById('admin-lock').style.display='block';
            alert("WELCOME BACK ADMIN ASMAR");
        }
    }

    function loadRanks() {
        const s = document.getElementById('sector').value;
        const r = document.getElementById('rank');
        r.innerHTML = "";
        const data = {
            "عسكري": ["جندي", "عريف", "رقيب", "ملازم", "نقيب", "لواء"],
            "طبي": ["طبيب متدرب", "ممرض", "طبيب عام", "استشاري", "مدير"],
            "حكومي": ["إداري", "سكرتير", "مدير مكتب", "وكيل"]
        };
        if(data[s]) data[s].forEach(x => r.innerHTML += `<option value="${x}">${x}</option>`);
    }

    function toggleInputs() {
        const s = document.getElementById('status').value;
        document.getElementById('penalty-area').style.display = (s === 'نشط') ? 'none' : 'block';
        if(s === 'استقالة') document.getElementById('timer').value = 3;
    }

    function uploadData() {
        const obj = {
            name: document.getElementById('name').value,
            sector: document.getElementById('sector').value,
            rank: document.getElementById('rank').value,
            status: document.getElementById('status').value,
            reason: document.getElementById('reason').value || "لا يوجد",
            punish: document.getElementById('punish').value || "لا يوجد",
            timer: document.getElementById('timer').value || 0,
            date: new Date().toLocaleDateString()
        };
        db.ref('GRAND_HR/').push(obj);
        alert("DONE!");
    }

    db.ref('GRAND_HR/').on('value', snap => {
        const h = document.getElementById('home-data');
        const b = document.getElementById('black-data');
        h.innerHTML = b.innerHTML = "";
        snap.forEach(c => {
            const v = c.val();
            const id = c.key;
            const btn = root ? `<button onclick="db.ref('GRAND_HR/${id}').remove()">🗑️</button>` : '';
            if(v.status === 'نشط') {
                h.innerHTML += `<tr><td>${v.name}</td><td>${v.sector}</td><td>${v.rank}</td><td><span class="status-badge bg-active">نشط</span></td><td>${v.date} ${btn}</td></tr>`;
            } else {
                b.innerHTML += `<tr><td>${v.name}</td><td>${v.status}</td><td>${v.reason}</td><td>${v.punish}</td><td>${v.timer} يوم</td><td>${btn}</td></tr>`;
            }
        });
    });

    function toggleChat() { 
        const c = document.getElementById('chat-window');
        c.style.display = (c.style.display === 'flex') ? 'none' : 'flex';
    }

    function sendMsg() {
        const t = document.getElementById('mText').value;
        if(t) {
            db.ref('GRAND_CHAT/').push({ user: root ? 'ASMAR' : 'Zair', text: t });
            document.getElementById('mText').value = "";
        }
    }

    db.ref('GRAND_CHAT/').limitToLast(10).on('value', s => {
        const m = document.getElementById('msgs'); m.innerHTML = "";
        s.forEach(x => m.innerHTML += `<div style="margin-bottom:10px; font-size:0.8em;"><b style="color:var(--accent-color)">${x.val().user}:</b> ${x.val().text}</div>`);
    });

    setInterval(() => { document.getElementById('current-time').innerText = new Date().toLocaleString(); }, 1000);
</script>
</body>
</html>
