<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل بلاك ليست - One Lion</title>
    <style>
        :root {
            --danger: #c0392b;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent: #f39c12;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .header-box {
            text-align: center;
            border: 2px solid var(--danger);
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 10px;
            background: rgba(192, 57, 43, 0.1);
        }

        .admin-form {
            max-width: 600px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-top: 5px solid var(--danger);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--accent);
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--danger);
            outline: none;
        }

        .btn-submit {
            background-color: var(--danger);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-submit:hover {
            background-color: #e74c3c;
            box-shadow: 0 0 15px rgba(231, 76, 60, 0.4);
        }

        .footer {
            text-align: center;
            margin-top: 50px;
            font-size: 0.9em;
            color: #666;
        }

        .footer span { color: var(--accent); }
    </style>
</head>
<body>

<div class="header-box">
    <h1>نظام حظر الموظفين - ولاية One Lion 🦁</h1>
    <p>تحذير: هذه الصفحة مخصصة للإدارة فقط لإضافة المخالفين</p>
</div>

<div class="admin-form">
    <form>
        <div class="form-group">
            <label>اسم الشخص المخالف:</label>
            <input type="text" placeholder="أدخل الاسم الكامل" required>
        </div>

        <div class="form-group">
            <label>الرقم التعريفي (ID):</label>
            <input type="number" placeholder="رقم التعريف في الولاية">
        </div>

        <div class="form-group">
            <label>سبب الإدراج في البلاك ليست:</label>
            <textarea rows="4" placeholder="اذكر السبب بالتفصيل (مثلاً: سرقة، سوء تعامل...)"></textarea>
        </div>

        <div class="form-group">
            <label>مدة الحظر:</label>
            <select>
                <option>أسبوع</option>
                <option>شهر</option>
                <option>حظر نهائي (Permanent)</option>
            </select>
        </div>

        <div class="form-group">
            <label>اسم المسؤول الذي قام بالحظر:</label>
            <input type="text" placeholder="اسمك كصاحب موقع/إدارة">
        </div>

        <button type="submit" class="btn-submit">تسجيل في القائمة السوداء 🚫</button>
    </form>
</div>

<div class="footer">
    تصميم وبرمجة حصرية لـ <span>Asmar</span> &copy; 2026<br>
    One Lion Management System
</div>

</body>
</html>
