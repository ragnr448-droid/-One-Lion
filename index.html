<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الموارد البشرية</title>
    <style>
        :root {
            --primary-color: #006C35; /* لون وزارة الموارد البشرية الأخضر */
            --accent-color: #D4AF37;
            --bg-color: #f4f7f6;
            --danger-color: #e74c3c;
            --dark-color: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* الهيدر */
        header {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .nav-btn {
            background-color: var(--primary-color);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .nav-btn:hover {
            background-color: var(--dark-color);
        }

        /* قسم الإضافة */
        .admin-panel {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        .input-group {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 10px;
        }

        input, select {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
        }

        .add-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* الجداول */
        .list-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .card h3 {
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
            color: var(--dark-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            text-align: right;
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        .status-active { color: var(--primary-color); font-weight: bold; }
        .status-blocked { color: var(--danger-color); font-weight: bold; }

    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h2 style="margin:0; color: var(--primary-color);">وزارة الموارد البشرية</h2>
            <small>نظام إدارة سجلات الموظفين</small>
        </div>
        <a href="admin_dashboard.html" class="nav-btn">لوحة التحكم الإدارية ←</a>
    </header>

    <div class="admin-panel">
        <h3>إضافة سجل جديد</h3>
        <div class="input-group">
            <input type="text" id="empName" placeholder="اسم الموظف بالكامل">
            <select id="empStatus">
                <option value="موظف">موظف (نشط)</option>
                <option value="مفصول">مفصول (قائمة سوداء)</option>
            </select>
            <input type="text" id="empID" placeholder="رقم الهوية">
            <button class="add-btn" onclick="addEmployee()">إضافة للنظام</button>
        </div>
    </div>

    <div class="list-section">
        <div class="card">
            <h3>✅ الموظفون الحاليون</h3>
            <table id="activeTable">
                <thead>
                    <tr>
                        <th>الاسم</th>
                        <th>الحالة</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>

        <div class="card">
            <h3>🚫 القائمة السوداء (المفصولين)</h3>
            <table id="blackListTable">
                <thead>
                    <tr>
                        <th>الاسم</th>
                        <th>السبب</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    function addEmployee() {
        const name = document.getElementById('empName').value;
        const status = document.getElementById('empStatus').value;
        const id = document.getElementById('empID').value;

        if(name === "" || id === "") {
            alert("الرجاء إكمال البيانات");
            return;
        }

        if(status === "موظف") {
            const table = document.getElementById('activeTable').getElementsByTagName('tbody')[0];
            const row = table.insertRow();
            row.innerHTML = `<td>${name}</td><td class="status-active">نشط</td>`;
        } else {
            const table = document.getElementById('blackListTable').getElementsByTagName('tbody')[0];
            const row = table.insertRow();
            row.innerHTML = `<td>${name}</td><td class="status-blocked">مدرج في القائمة</td>`;
        }

        // مسح الخانات بعد الإضافة
        document.getElementById('empName').value = "";
        document.getElementById('empID').value = "";
    }
</script>

</body>
</html>
