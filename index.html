<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام اختبارات القبول | وزارة الموارد البشرية</title>
    <style>
        :root { --primary: #0f172a; --gold: #c5a048; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        header { background: var(--primary); color: white; padding: 20px; text-align: center; border-bottom: 4px solid var(--gold); }
        .container { max-width: 900px; margin: 20px auto; padding: 0 15px; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; border-top: 3px solid var(--gold); }
        
        /* حالة الوصول */
        .locked { display: none; } /* الأقسام المقفلة للزوار */
        .unlocked { display: block; } /* الأقسام المفتوحة للجميع مثل الاختبار */

        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; font-family: inherit; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-gold { background: var(--gold); color: white; width: 100%; }
        .btn-red { background: #ef4444; color: white; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--primary); display: flex; justify-content: space-around; padding: 15px 0; border-top: 2px solid var(--gold); }
        .nav-item { color: white; cursor: pointer; font-size: 0.8rem; text-align: center; opacity: 0.7; }
        .active-nav { opacity: 1; color: var(--gold); }
        
        .exam-item { background: #f1f5f9; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-right: 5px solid var(--gold); }
        .admin-only { display: none; }
    </style>
</head>
<body>

<header>
    <h2>وزارة الموارد البشرية</h2>
    <p id="access-msg" style="font-size: 0.8rem; color: var(--gold);">نظام الاختبارات متاح الآن للجميع</p>
</header>

<div class="container">

    <div id="page-exam" class="page unlocked active">
        <div class="card">
            <h3>📝 استمارة اختبار موظف جديد</h3>
            <p style="font-size: 0.8rem; color: #666;">معرف جهازك: <span id="my-id-display"></span></p>
            <input type="text" id="ex-name" placeholder="الاسم الكامل">
            <label>1. كيف تتعامل مع الحالات الطارئة؟</label>
            <textarea id="ex-q1" rows="3"></textarea>
            <label>2. ما هي مهاراتك التي تفيد الوزارة؟</label>
            <textarea id="ex-q2" rows="3"></textarea>
            <button class="btn btn-gold" onclick="sendExam()">إرسال الاختبار للمراجعة</button>
        </div>
    </div>

    <div id="page-factions" class="page locked">
        <div class="card">
            <h3>🏢 دواوين الوزارة المعتمدة</h3>
            <div id="factions-data">
                <p>يتم تحميل بيانات الموظفين...</p>
            </div>
        </div>
    </div>

    <div id="page-admin" class="page admin-only">
        <div class="card">
            <h3>🔍 مراجعة اختبارات المتقدمين</h3>
            <div id="review-list">لا يوجد اختبارات بانتظار المراجعة.</div>
        </div>
        <button class="btn btn-red" style="width:100%" onclick="fullReset()">تصفير شامل للنظام</button>
    </div>

</div>

<nav class="nav-bar">
    <div class="nav-item active-nav" onclick="navTo('page-exam')">📝<br>الاختبار</div>
    <div class="nav-item" onclick="navTo('page-factions')">🏢<br>الدواوين</div>
    <div class="nav-item admin-only" id="admin-nav" onclick="navTo('page-admin')">⚙️<br>الإدارة</div>
    <div class="nav-item" onclick="adminLogin()">🔑<br>دخول أسمر</div>
</nav>

<script>
    const myId = localStorage.getItem('did') || 'ID-' + Math.floor(Math.random()*9999);
    localStorage.setItem('did', myId);
    document.getElementById('my-id-display').innerText = myId;

    let role = localStorage.getItem('role') || 'Guest'; // Guest, Staff, Asmar

    // التحقق من الصلاحيات وتحديث الواجهة
    function syncAccess() {
        const auths = JSON.parse(localStorage.getItem('auth_list') || "{}");
        if(auths[myId]) role = auths[myId]; // (Staff or Asmar)
        if(localStorage.getItem('isAsmar') === 'true') role = 'Asmar';

        if(role === 'Asmar' || role === 'Staff') {
            document.querySelectorAll('.locked').forEach(el => el.style.display = 'block');
            document.getElementById('access-msg').innerText = `مرحباً بك: ${role === 'Asmar' ? 'المشرف العام' : 'موظف معتمد'}`;
        }
        
        if(role === 'Asmar') {
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
            renderExamsForReview();
        }
    }

    // إرسال الاختبار (متاح للزائر)
    function sendExam() {
        const name = document.getElementById('ex-name').value;
        const q1 = document.getElementById('ex-q1').value;
        if(!name || !q1) return alert("الرجاء إكمال بيانات الاختبار");

        let exams = JSON.parse(localStorage.getItem('pending_exams') || "[]");
        exams.push({
            id: myId,
            name: name,
            answers: [q1, document.getElementById('ex-q2').value],
            date: new Date().toLocaleString()
        });
        localStorage.setItem('pending_exams', JSON.stringify(exams));
        alert("تم إرسال اختبارك بنجاح! انتظر مراجعة أسمر لتعميد جهازك.");
    }

    // عرض الاختبارات للمشرف (أسمر)
    function renderExamsForReview() {
        const exams = JSON.parse(localStorage.getItem('pending_exams') || "[]");
        const list = document.getElementById('review-list');
        if(exams.length === 0) { list.innerHTML = "لا يوجد اختبارات حالياً."; return; }

        list.innerHTML = exams.map(ex => `
            <div class="exam-item">
                <b>المتقدم: ${ex.name}</b> <small>(${ex.id})</small><br>
                <p>إجابة 1: ${ex.answers[0]}</p>
                <p>إجابة 2: ${ex.answers[1]}</p>
                <button class="btn btn-gold" style="width:auto; padding:5px 10px;" onclick="approveExam('${ex.id}', '${ex.name}')">قبول وتعميد كـ موظف ✅</button>
            </div>
        `).join('');
    }

    // قبول الموظف وتعميده فوراً
    function approveExam(deviceId, name) {
        let auths = JSON.parse(localStorage.getItem('auth_list') || "{}");
        auths[deviceId] = 'Staff'; // منحه رتبة موظف
        localStorage.setItem('auth_list', JSON.stringify(auths));

        // إضافة الموظف لديوان HR تلقائياً
        let staff = JSON.parse(localStorage.getItem('staff_db') || "[]");
        staff.push({ name: name, faction: 'المحاورين', rank: 'موظف مستجد' });
        localStorage.setItem('staff_db', JSON.stringify(staff));

        // حذف الاختبار من قائمة الانتظار
        let exams = JSON.parse(localStorage.getItem('pending_exams') || "[]");
        localStorage.setItem('pending_exams', JSON.stringify(exams.filter(e => e.id !== deviceId)));

        alert(`تم قبول ${name} وتفعيله كـ موظف مشاهد في النظام.`);
        renderExamsForReview();
    }

    function navTo(pageId) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById(pageId).style.display = 'block';
    }

    function adminLogin() {
        if(prompt("رمز المشرف العام:") === "asmar123") {
            localStorage.setItem('isAsmar', 'true');
            location.reload();
        }
    }

    function logout() { localStorage.clear(); location.reload(); }
    function fullReset() { if(confirm("حذف شامل؟")) { localStorage.clear(); location.reload(); } }

    window.onload = syncAccess;
</script>
</body>
</html>
