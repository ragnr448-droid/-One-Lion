<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وزارة الموارد البشرية - النظام المتكامل</title>
    <style>
        /* التنسيقات الأساسية - تصميم Asmar */
        * { box-sizing: border-box; }
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; direction: rtl; }
        .mobile-container { width: 100%; max-width: 414px; background-color: #ffffff; min-height: 100vh; position: relative; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        header { background-color: #1a1f36; color: white; padding: 20px 15px; display: flex; justify-content: space-between; align-items: center; min-height: 80px; }
        .logo-area h1 { font-size: 17px; margin: 0; }
        .logo-area p { font-size: 10px; color: #c4a457; margin: 0; }

        .top-section { background-color: #1a1f36; color: white; padding: 30px 20px 60px 20px; text-align: center; border-radius: 0 0 40px 0; }
        .sub-title { color: #c4a457; font-size: 11px; display: block; margin-bottom: 5px; }

        .button-group { display: flex; flex-direction: column; gap: 8px; padding: 0 20px; margin-top: -40px; z-index: 5; }
        .btn { width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; font-size: 13px; cursor: pointer; text-align: center; border: none; transition: 0.3s; }
        .btn-gold { background: #c4a457; color: #1a1f36; }
        .btn-outline { background: white; border: 2px solid #c4a457; color: #c4a457; }
        .btn-black { background: #000; color: #fff; }

        /* الصفحات المنبثقة */
        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; display: none; overflow-y: auto; }
        .page-header { background: #1a1f36; color: white; padding: 20px; display: flex; align-items: center; gap: 15px; position: sticky; top: 0; }
        
        /* كروت الاستقالة والبلاك لست */
        .card { background: #f8f9fa; border-right: 5px solid #c4a457; padding: 15px; margin: 10px 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .timer { color: #d9534f; font-weight: bold; font-size: 12px; display: block; margin-top: 5px; }
        .reason-text { font-size: 11px; color: #666; margin-top: 5px; display: block; }

        input, select, textarea { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; }
        footer { background: #1a1f36; color: white; text-align: center; padding: 20px; margin-top: auto; }
        .signature { color: #c4a457; font-family: cursive; font-size: 16px; }
    </style>
</head>
<body onload="checkSession()">

<div class="mobile-container">
    <header>
        <div class="menu-icon" onclick="openOverlay('loginOverlay')">☰</div>
        <div class="logo-area">
            <h1>وزارة الموارد البشرية</h1>
            <p>بوابة الخدمات الإلكترونية</p>
        </div>
    </header>

    <div class="top-section">
        <span class="sub-title">البوابة الرقمية الرسمية</span>
        <h2>نظام الإدارة المتكامل</h2>
    </div>

    <div class="button-group">
        <button class="btn btn-gold" onclick="openPage('staffPage')">عرض الموظفين</button>
        <button class="btn btn-outline" onclick="openPage('resignPage')">طلبات الاستقالة (فترة التهدئة)</button>
        <button class="btn btn-black" onclick="openPage('blacklistPage')">قائمة البلاك لست (الحظر)</button>
    </div>

    <footer>
        <span class="signature">Designed by Asmar</span>
    </footer>

    <div id="resignPage" class="full-page">
        <div class="page-header">
            <span onclick="closePage('resignPage')">➔</span>
            <h3>طلبات الاستقالة - 3 أيام تهدئة</h3>
        </div>
        <div id="resignContainer"></div>
        <div id="resignAdmin" style="display:none; padding:15px;">
            <input type="text" id="rName" placeholder="اسم الموظف المستقيل">
            <button class="btn btn-gold" onclick="addResign()">بدء فترة التهدئة</button>
        </div>
    </div>

    <div id="blacklistPage" class="full-page">
        <div class="page-header">
            <span onclick="closePage('blacklistPage')">➔</span>
            <h3>قائمة البلاك لست</h3>
        </div>
        <div id="blacklistContainer"></div>
        <div id="blackAdmin" style="display:none; padding:15px;">
            <input type="text" id="bName" placeholder="الاسم الرباعي">
            <textarea id="bReason" placeholder="سبب الإدراج في البلاك لست"></textarea>
            <button class="btn btn-black" onclick="addBlacklist()">إدراج في القائمة السوداء</button>
        </div>
    </div>

    <div id="loginOverlay" style="position:fixed; top:0; right:-100%; width:100%; height:100%; background:#1a1f36; z-index:3000; transition:0.4s; padding:40px; color:white;">
        <span onclick="closeOverlay('loginOverlay')" style="font-size:30px;">×</span>
        <h2>دخول الإدارة</h2>
        <input type="password" id="adminPass" placeholder="كلمة السر...">
        <button class="btn btn-gold" onclick="login()">دخول</button>
    </div>
</div>

<script>
    let resigneers = JSON.parse(localStorage.getItem('resigneers')) || [];
    let blacklisted = JSON.parse(localStorage.getItem('blacklisted')) || [];

    function checkSession() {
        if (localStorage.getItem('asmar_auth') === 'true') {
            document.getElementById('resignAdmin').style.display = 'block';
            document.getElementById('blackAdmin').style.display = 'block';
        }
        renderResign();
        renderBlacklist();
        updateTimers();
    }

    function openPage(id) { document.getElementById(id).style.display = 'block'; }
    function closePage(id) { document.getElementById(id).style.display = 'none'; }
    function openOverlay(id) { document.getElementById(id).style.right = '0'; }
    function closeOverlay(id) { document.getElementById(id).style.right = '-100%'; }

    function login() {
        const p = document.getElementById('adminPass').value;
        if(p === "asmar123" || p === "HR12") {
            localStorage.setItem('asmar_auth', 'true');
            location.reload();
        }
    }

    // منطق الاستقالة والتهدئة
    function addResign() {
        const name = document.getElementById('rName').value;
        if(!name) return;
        const endTime = new Date().getTime() + (3 * 24 * 60 * 60 * 1000); // 3 أيام
        resigneers.push({ name, endTime });
        saveAndRender();
    }

    function updateTimers() {
        setInterval(() => {
            renderResign();
        }, 1000);
    }

    function renderResign() {
        const container = document.getElementById('resignContainer');
        container.innerHTML = "";
        const now = new Date().getTime();
        
        resigneers.forEach(r => {
            const distance = r.endTime - now;
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const secs = Math.floor((distance % (1000 * 60)) / 1000);

            const timerText = distance > 0 ? 
                `باقي على الاستقالة: ${days} يوم و ${hours}:${mins}:${secs}` : 
                "انتهت فترة التهدئة - استقالة نظيفة";

            container.innerHTML += `
                <div class="card">
                    <strong>${r.name}</strong>
                    <span class="timer">${timerText}</span>
                </div>`;
        });
    }

    // منطق البلاك لست
    function addBlacklist() {
        const name = document.getElementById('bName').value;
        const reason = document.getElementById('bReason').value;
        if(!name) return;
        blacklisted.push({ name, reason, date: new Date().toLocaleDateString() });
        saveAndRender();
    }

    function renderBlacklist() {
        const container = document.getElementById('blacklistContainer');
        container.innerHTML = "";
        blacklisted.forEach(b => {
            container.innerHTML += `
                <div class="card" style="border-right-color: #000;">
                    <strong>${b.name}</strong>
                    <span class="reason-text">السبب: ${b.reason}</span>
                    <small style="font-size:9px;">التاريخ: ${b.date}</small>
                </div>`;
        });
    }

    function saveAndRender() {
        localStorage.setItem('resigneers', JSON.stringify(resigneers));
        localStorage.setItem('blacklisted', JSON.stringify(blacklisted));
        renderResign();
        renderBlacklist();
    }
</script>

</body>
</html>
