<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وزارة الموارد البشرية | المبرمج Asmar</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Tajawal:wght@400;700&display=swap');
        
        :root {
            --panel-dark: #0a0b10;
            --accent: #ff4655;
            --gov-blue: #007bff;
            --med-green: #28a745;
            --mil-gold: #ffc107;
            --pol-blue: #17a2b8;
            --glow: rgba(255, 70, 85, 0.3);
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: #050505;
            color: white;
            margin: 0;
            background-image: radial-gradient(circle at top right, #1a1a2e, #050505);
            background-attachment: fixed;
        }

        header {
            background: rgba(10, 11, 16, 0.95);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--accent);
            box-shadow: 0 0 20px var(--glow);
        }

        .hr-logo { font-family: 'Orbitron', sans-serif; font-size: 30px; font-weight: 900; }
        .hr-logo span { color: var(--accent); text-shadow: 0 0 10px var(--accent); }

        .container { max-width: 1400px; margin: 30px auto; padding: 0 20px; }

        /* لوحة التحكم */
        .admin-box {
            display: none; background: #0f1016; border: 1px dashed var(--accent);
            padding: 25px; border-radius: 8px; margin-bottom: 30px;
        }

        .input-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        input, select { background: #16171d; border: 1px solid #2a2a35; color: white; padding: 12px; border-radius: 4px; }

        .btn-add { background: var(--accent); color: white; border: none; padding: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 15px; width: 100%; }

        /* شبكة الفصائل */
        .faction-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        
        .faction-card { background: #0f1016; border-radius: 8px; border-top: 5px solid white; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .faction-header { padding: 15px; font-weight: bold; font-family: 'Orbitron'; font-size: 1.1em; display: flex; justify-content: space-between; }
        
        .f-gov { border-top-color: var(--gov-blue); }
        .f-med { border-top-color: var(--med-green); }
        .f-mil { border-top-color: var(--mil-gold); }
        .f-pol { border-top-color: var(--pol-blue); }

        table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        th { background: #16171d; color: #777; padding: 10px; text-align: right; }
        td { padding: 10px; border-bottom: 1px solid #15151b; }

        .rank-tag { background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 4px; color: #ccc; font-size: 0.8em; }
        
        /* سجل الزوار */
        .visitor-log { position: fixed; bottom: 10px; right: 10px; font-size: 0.7em; color: #444; }

    </style>
</head>
<body>

<header>
    <div class="hr-logo">𝓗𝓡 <span></span></div>
    <div style="text-align: left">
        <div style="color: var(--accent); font-weight: bold;">وزارة الموارد البشرية</div>
        <button onclick="auth()" style="background:none; border:none; color:gray; cursor:pointer; font-size:10px;">[ دخول الإدارة ]</button>
    </div>
</header>

<div class="container">
    
    <div id="adminPanel" class="admin-box">
        <h2 style="margin-top:0;">🛠️ إضافة موظف جديد</h2>
        <div class="input-group">
            <input type="text" id="empName" placeholder="الاسم الكامل">
            <select id="empFaction" onchange="loadRanks()">
                <option value="">اختر الفصيل</option>
                <option value="gov">🏛️ القطاع الحكومي</option>
                <option value="med">🏥 التحالف الطبي</option>
                <option value="army">🎖️ قوات الجيش</option>
                <option value="police">🚔 جهاز الشرطة</option>
            </select>
            <select id="empRank"><option>الرتبة</option></select>
        </div>
        <button class="btn-add" onclick="pushData()">اعتماد وإضافة</button>
        <div id="logs" style="margin-top:10px; font-size:12px; color: #28a745;"></div>
    </div>

    <div class="faction-grid">
        <div class="faction-card f-gov">
            <div class="faction-header"><span>🏛️ القطاع الحكومي</span> <small id="count-gov">0</small></div>
            <table><thead><tr><th>الاسم</th><th>الرتبة</th></tr></thead><tbody id="list-gov"></tbody></table>
        </div>

        <div class="faction-card f-med">
            <div class="faction-header"><span>🏥 التحالف الطبي</span> <small id="count-med">0</small></div>
            <table><thead><tr><th>الاسم</th><th>الرتبة</th></tr></thead><tbody id="list-med"></tbody></table>
        </div>

        <div class="faction-card f-mil">
            <div class="faction-header"><span>🎖️ قوات الجيش</span> <small id="count-army">0</small></div>
            <table><thead><tr><th>الاسم</th><th>الرتبة</th></tr></thead><tbody id="list-army"></tbody></table>
        </div>

        <div class="faction-card f-pol">
            <div class="faction-header"><span>🚔 جهاز الشرطة</span> <small id="count-police">0</small></div>
            <table><thead><tr><th>الاسم</th><th>الرتبة</th></tr></thead><tbody id="list-police"></tbody></table>
        </div>
    </div>

</div>

<div class="visitor-log" id="v-log"></div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyDP8F9r4h7pzhl3FV9-eR-6uC9R4W80mE",
        authDomain: "hr-asmar.firebaseapp.com",
        databaseURL: "https://hr-asmar-default-rtdb.firebaseio.com",
        projectId: "hr-asmar",
        storageBucket: "hr-asmar.firebasestorage.app",
        messagingSenderId: "642339321351",
        appId: "1:642339321351:web:28780333d7b819f798ec4b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let isAsmar = false;

    // سجل الزوار
    db.ref('VISITS').push({ time: new Date().toLocaleString() });
    db.ref('VISITS').limitToLast(1).on('value', s => {
        document.getElementById('v-log').innerText = "آخر دخول للنظام: " + Object.values(s.val())[0].time;
    });

    function auth() {
        if(prompt("كلمة سر المبرمج Asmar:") === "asmar123") {
            isAsmar = true;
            document.getElementById('adminPanel').style.display = 'block';
            render();
        }
    }

    const ranksData = {
        gov: ["موظف مستجد", "إداري", "رئيس قسم", "مدير عام", "وكيل وزارة", "وزير"],
        med: ["مسعف", "ممرض", "طبيب عام", "جراح", "استشاري", "وزير الصحة"],
        army: ["جندي", "جندي أول", "عريف", "رقيب", "ملازم", "نقيب", "رائد", "عقيد", "لواء"],
        police: ["شرطي", "عريف", "رقيب", "ملازم أول", "نقيب", "رائد", "عميد", "مدير الأمن"]
    };

    function loadRanks() {
        const f = document.getElementById('empFaction').value;
        const r = document.getElementById('empRank');
        r.innerHTML = "";
        if(ranksData[f]) ranksData[f].forEach(x => r.innerHTML += `<option value="${x}">${x}</option>`);
    }

    function pushData() {
        const name = document.getElementById('empName').value;
        const faction = document.getElementById('empFaction').value;
        const rank = document.getElementById('empRank').value;
        if(name && faction) {
            db.ref('GRAND_ASMAR/').push({ name, faction, rank });
            document.getElementById('empName').value = "";
            document.getElementById('logs').innerText = "✅ تم إضافة " + name + " بنجاح!";
        }
    }

    db.ref('GRAND_ASMAR/').on('value', snap => { render(snap.val()); });

    function render(data) {
        const sectors = ['gov', 'med', 'army', 'police'];
        const counts = { gov:0, med:0, army:0, police:0 };
        sectors.forEach(s => document.getElementById('list-' + s).innerHTML = "");

        if(!data) return;

        for(let id in data) {
            const emp = data[id];
            counts[emp.faction]++;
            const row = `<tr>
                <td>${emp.name}</td>
                <td><span class="rank-tag">${emp.rank}</span></td>
                ${isAsmar ? `<td style="color:red; cursor:pointer" onclick="db.ref('GRAND_ASMAR/${id}').remove()">×</td>` : ''}
            </tr>`;
            document.getElementById('list-' + emp.faction).innerHTML += row;
        }

        sectors.forEach(s => document.getElementById('count-' + s).innerText = counts[s]);
    }
</script>
</body>
</html>
