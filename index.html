<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وزارة الموارد البشرية - النظام الذكي</title>
    <style>
        /* التنسيق الأصلي - تصميم Asmar */
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; direction: rtl; }
        .mobile-container { width: 100%; max-width: 414px; background-color: #ffffff; min-height: 100vh; position: relative; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); }

        header { background-color: #1a1f36; color: white; padding: 25px 15px; display: flex; justify-content: space-between; align-items: center; }
        .logo-area h1 { font-size: 18px; margin: 0; }
        .logo-area p { font-size: 11px; color: #c4a457; margin: 0; }

        .banner { background-color: #1a1f36; color: white; padding: 35px 20px 60px 20px; text-align: center; border-radius: 0 0 40px 0; }
        .sub-title { color: #c4a457; font-size: 12px; display: block; margin-bottom: 8px; }

        /* الأزرار */
        .main-nav { padding: 0 20px; margin-top: -35px; display: flex; flex-direction: column; gap: 8px; z-index: 5; }
        .btn { width: 100%; padding: 12px; border-radius: 12px; font-weight: bold; font-size: 13px; cursor: pointer; text-align: center; border: none; transition: 0.3s; }
        .btn-gold { background: #c4a457; color: #1a1f36; }
        .btn-outline { background: white; border: 2px solid #c4a457; color: #c4a457; }
        .btn-black { background: #000; color: white; }

        /* الإشعارات */
        #notification { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%); 
            background: #28a745; color: white; padding: 10px 25px; border-radius: 30px; 
            font-size: 13px; font-weight: bold; display: none; z-index: 5000; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* الإحصائيات */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .stat-card { background: white; padding: 15px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #f0f0f0; }
        .stat-card h3 { margin: 0; font-size: 24px; color: #1a1f36; }

        /* الصفحات */
        .page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; display: none; overflow-y: auto; }
        .p-header { background: #1a1f36; color: white; padding: 20px; display: flex; align-items: center; gap: 15px; position: sticky; top: 0; }
        
        .item-card { background: #f8f9fa; border-right: 5px solid #c4a457; padding: 12px; margin: 8px 15px; border-radius: 8px; font-size: 13px; }
        .f-tag { font-size: 10px; background: #eee; padding: 2px 6px; border-radius: 4px; margin-right: 5px; }

        footer { background: #1a1f36; color: white; text-align: center; padding: 20px; margin-top: auto; }
        .asmar-sig { color: #c4a457; font-family: 'Brush Script MT', cursive; font-size: 18px; display: block; margin-top: 5px; }

        input, select, textarea { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; }
        #loginScreen { position: fixed; top: 0; right: -100%; width: 100%; height: 100%; background: #1a1f36; z-index: 3000; transition: 0.4s; padding: 50px 20px; color: white; }
    </style>
</head>
<body onload="init()">

<div id="notification">تمت العملية بنجاح ✅</div>

<div class="mobile-container">
    <header>
        <div onclick="showLogin()" style="cursor:pointer; font-size:24px;">☰</div>
        <div class="logo-area">
            <h1>وزارة الموارد البشرية</h1>
            <p>بوابة الخدمات الإلكترونية</p>
        </div>
    </header>

    <div class="banner">
        <span class="sub-title">البوابة الرقمية الرسمية</span>
        <h2>نظام إدارة الفصائل الحكومية</h2>
    </div>

    <div class="main-nav">
        <button class="btn btn-gold" onclick="openP('staffP')">عرض الموظفين الحاليين</button>
        <button class="btn btn-outline" onclick="openP('resignP')">الاستقالات (التهدئة)</button>
        <button class="btn btn-outline" onclick="openP('tasksP')">مهام المحاورين</button>
        <button class="btn btn-black" onclick="openP('blackP')">قائمة البلاك لست</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><h3 id="sNum">0</h3><p>الموظفين</p></div>
        <div class="stat-card"><h3 id="tNum">0</h3><p>المهام</p></div>
    </div>

    <footer>
        <div style="font-size:12px;">وزارة الموارد البشرية</div>
        <span class="asmar-sig">Designed by Asmar</span>
    </footer>

    <div id="loginScreen">
        <span onclick="hideLogin()" style="font-size:30px; cursor:pointer;">×</span>
        <h2>دخول الإدارة</h2>
        <input type="password" id="pass" placeholder="كلمة السر...">
        <button class="btn btn-gold" onclick="login()">دخول</button>
    </div>

    <div id="staffP" class="page">
        <div class="p-header"><span onclick="closeP('staffP')">➔</span><h3>شؤون الموظفين</h3></div>
        <div id="admS" style="display:none; padding:15px; border-bottom:2px solid #eee;">
            <input type="text" id="inName" placeholder="اسم الموظف">
            <select id="inFact">
                <option>شرطة</option><option>جيش</option><option>تحالف طبي</option><option>الحكومة</option>
            </select>
            <button class="btn btn-gold" onclick="addStaff()">إضافة الموظف للفصيل</button>
        </div>
        <div id="staffList"></div>
    </div>

    <div id="resignP" class="page">
        <div class="p-header"><span onclick="closeP('resignP')">➔</span><h3>طلبات الاستقالة</h3></div>
        <div id="admR" style="display:none; padding:15px;">
            <select id="rSelect" style="margin-bottom:10px;"></select>
            <button class="btn btn-gold" onclick="addResign()">تحويل للاستقالة (حذف من الموظفين)</button>
        </div>
        <div id="resignList"></div>
    </div>

    <div id="blackP" class="page">
        <div class="p-header"><span onclick="closeP('blackP')">➔</span><h3>قائمة البلاك لست</h3></div>
        <div id="admB" style="display:none; padding:15px;">
            <select id="bSelect" style="margin-bottom:10px;"></select>
            <input type="text" id="bReason" placeholder="سبب البلاك لست">
            <button class="btn btn-black" onclick="addBlack()">إدراج بلاك لست (حذف من الموظفين)</button>
        </div>
        <div id="blackList"></div>
    </div>

    <div id="tasksP" class="page">
        <div class="p-header"><span onclick="closeP('tasksP')">➔</span><h3>المهام الأسبوعية</h3></div>
        <div id="admT" style="display:none; padding:15px;">
            <textarea id="tDesc" placeholder="اكتب المهمة هنا..."></textarea>
            <button class="btn btn-gold" onclick="addTask()">إضافة المهمة</button>
        </div>
        <div id="tasksList"></div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('asmar_final')) || { staff: [], resigns: [], tasks: [], black: [] };

    function init() {
        if(localStorage.getItem('auth') === 'true') showAdmin();
        render();
        setInterval(renderResigns, 1000);
    }

    function showNotify(msg) {
        const n = document.getElementById('notification');
        n.innerText = msg; n.style.display = 'block';
        setTimeout(() => n.style.display = 'none', 3000);
    }

    function showLogin() { document.getElementById('loginScreen').style.right = '0'; }
    function hideLogin() { document.getElementById('loginScreen').style.right = '-100%'; }
    
    function login() {
        const p = document.getElementById('pass').value;
        if(p === "asmar123" || p === "HR12") {
            localStorage.setItem('auth', 'true');
            location.reload();
        }
    }

    function showAdmin() {
        ['admS', 'admR', 'admB', 'admT'].forEach(id => document.getElementById(id).style.display = 'block');
    }

    function openP(id) { 
        document.getElementById(id).style.display = 'block'; 
        updateSelects(); 
    }
    function closeP(id) { document.getElementById(id).style.display = 'none'; }

    // إضافة موظف جديد
    function addStaff() {
        const name = document.getElementById('inName').value;
        const fact = document.getElementById('inFact').value;
        if(!name) return;
        db.staff.push({ id: Date.now(), name, fact });
        save("تم إضافة الموظف بنجاح ✅");
        document.getElementById('inName').value = "";
    }

    // تحويل لاستقالة (حذف من جدول الموظفين)
    function addResign() {
        const id = document.getElementById('rSelect').value;
        const emp = db.staff.find(s => s.id == id);
        if(!emp) return;
        db.resigns.push({ name: emp.name, end: new Date().getTime() + (3*24*60*60*1000) });
        db.staff = db.staff.filter(s => s.id != id); // حذف الموظف من الجدول
        save("تم تحويل الموظف للاستقالة وحذفه من الجدول ✅");
    }

    // تحويل لبلاك لست (حذف من جدول الموظفين)
    function addBlack() {
        const id = document.getElementById('bSelect').value;
        const reason = document.getElementById('bReason').value;
        const emp = db.staff.find(s => s.id == id);
        if(!emp) return;
        db.black.push({ name: emp.name, reason: reason });
        db.staff = db.staff.filter(s => s.id != id); // حذف الموظف من الجدول
        save("تم إدراج الموظف في البلاك لست وحذفه من الجدول ✅");
    }

    function addTask() {
        db.tasks.push({ desc: document.getElementById('tDesc').value });
        save("تم إضافة المهمة ✅");
        document.getElementById('tDesc').value = "";
    }

    function save(msg) {
        localStorage.setItem('asmar_final', JSON.stringify(db));
        render();
        showNotify(msg);
        updateSelects();
    }

    function updateSelects() {
        const rS = document.getElementById('rSelect');
        const bS = document.getElementById('bSelect');
        [rS, bS].forEach(s => {
            s.innerHTML = db.staff.map(emp => `<option value="${emp.id}">${emp.name} (${emp.fact})</option>`).join('');
        });
    }

    function render() {
        // الموظفين
        const sl = document.getElementById('staffList'); sl.innerHTML = "";
        db.staff.forEach(s => sl.innerHTML += `<div class="item-card"><span class="f-tag">${s.fact}</span> <strong>${s.name}</strong></div>`);
        document.getElementById('sNum').innerText = db.staff.length;

        // المهام
        const tl = document.getElementById('tasksList'); tl.innerHTML = "";
        db.tasks.forEach((t, i) => tl.innerHTML += `<div class="item-card">مهمة #${i+1}: ${t.desc}</div>`);
        document.getElementById('tNum').innerText = db.tasks.length;

        // البلاك لست
        const bl = document.getElementById('blackList'); bl.innerHTML = "";
        db.black.forEach(b => bl.innerHTML += `<div class="item-card" style="border-right-color:black;"><strong>${b.name}</strong><br><small style="color:red;">السبب: ${b.reason}</small></div>`);
        
        renderResigns();
    }

    function renderResigns() {
        const rl = document.getElementById('resignList'); rl.innerHTML = "";
        const now = new Date().getTime();
        db.resigns.forEach(r => {
            const diff = r.end - now;
            let timeTxt = (diff > 0) ? `باقي: ${Math.floor(diff/(1000*60*60*24))} يوم و ${Math.floor((diff%(1000*60*60*24))/(1000*60*60))}:${Math.floor((diff%(1000*60*60))/(1000*60))}:${Math.floor((diff%(1000*60))/1000)}` : "استقالة نظيفة ✅";
            rl.innerHTML += `<div class="item-card"><strong>${r.name}</strong><br><span style="color:#d9534f; font-weight:bold; font-size:11px;">${timeTxt}</span></div>`;
        });
    }
</script>
</body>
</html>
