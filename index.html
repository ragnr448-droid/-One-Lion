<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR ASMAR | GRAND RP ULTIMATE</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Tajawal:wght@400;700&display=swap');
        :root { --dark-panel: #0a0b10; --accent: #ff4655; --glow: rgba(255, 70, 85, 0.4); --text: #a0a0a8; }
        
        body { font-family: 'Tajawal', sans-serif; background: #050505; color: white; margin: 0; background-image: radial-gradient(circle at top right, #1a1a2e, #050505); background-attachment: fixed; }
        header { background: rgba(10, 11, 16, 0.95); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); box-shadow: 0 0 15px var(--glow); position: sticky; top:0; z-index: 1000; }
        .hr-logo { font-family: 'Orbitron', sans-serif; font-size: 28px; font-weight: 900; letter-spacing: 2px; }
        .hr-logo span { color: var(--accent); text-shadow: 0 0 10px var(--accent); }

        .wrapper { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--dark-panel); border-left: 1px solid #1f1f27; padding-top: 20px; }
        .nav-item { padding: 15px 25px; color: var(--text); cursor: pointer; transition: 0.3s; border-right: 4px solid transparent; display: block; text-decoration: none; font-weight: bold; font-size: 0.9em; }
        .nav-item:hover, .nav-item.active { background: linear-gradient(to left, rgba(255, 70, 85, 0.1), transparent); color: white; border-right-color: var(--accent); }

        .main-content { flex: 1; padding: 30px; }
        .page { display: none; animation: fadeIn 0.4s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .stat-card { background: #0f1016; border: 1px solid #1f1f27; padding: 20px; margin-bottom: 20px; border-radius: 4px; }
        .stat-card h2 { border-right: 4px solid var(--accent); padding-right: 15px; font-size: 1.1em; text-transform: uppercase; margin-bottom: 20px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #16171d; color: var(--accent); padding: 12px; text-align: right; font-size: 0.8em; }
        td { padding: 12px; border-bottom: 1px solid #15151b; font-size: 0.9em; }

        .admin-only { display: none; background: #111218; border: 1px dashed var(--accent); padding: 20px; margin-bottom: 20px; }
        input, select { background: #16171d; border: 1px solid #2a2a35; color: white; padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        .btn-action { background: var(--accent); color: white; border: none; padding: 12px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; margin-top: 10px; }
        .btn-action:hover { box-shadow: 0 0 10px var(--accent); }

        .log-entry { font-size: 0.8em; padding: 5px; border-bottom: 1px solid #222; color: #00ff88; }
    </style>
</head>
<body>

<header>
    <div class="hr-logo">𝓗𝓡 <span>𝓐𝓼𝓶𝓪𝓻</span></div>
    <div style="text-align: left">
        <div style="font-size: 0.8em; color: var(--accent)">وزارة الموارد البشرية</div>
        <div id="clock" style="font-size: 0.7em; color: gray;"></div>
    </div>
</header>

<div class="wrapper">
    <div class="sidebar" id="sidebar">
        <div class="nav-item active" onclick="showPage('home')">🏠 الصفحة الرئيسية</div>
        <div class="nav-item" onclick="showPage('blacklist')">🚫 القائمة السوداء</div>
        <div id="dynamic-nav"></div>
        <div class="nav-item" onclick="adminAuth()" style="margin-top: 30px; color: var(--accent)">🔐 دخول الإدارة</div>
    </div>

    <div class="main-content">
        <div id="admin-panel" class="admin-only">
            <h3>🛠️ لوحة تحكم المبرمج Asmar</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <h4>➕ إضافة موظف</h4>
                    <input type="text" id="name" placeholder="الاسم الكامل">
                    <select id="sector" onchange="updateRanks()"><option value="home">الرئيسية</option></select>
                    <select id="rank"><option>الرتبة</option></select>
                    <button class="btn-action" onclick="addEmp()">حفظ الموظف</button>
                </div>
                <div>
                    <h4>📂 إضافة صفحة/قسم جديد</h4>
                    <input type="text" id="newTabName" placeholder="اسم القسم (مثلاً: الاستخبارات)">
                    <button class="btn-action" style="background:#415a77" onclick="addNewTab()">إنشاء الصفحة فوراً</button>
                    <h4 style="margin-top:20px;">🕵️ سجل دخول الزوار</h4>
                    <div id="visitor-logs" style="height: 100px; overflow-y: auto; background: #000; padding: 10px; border-radius: 5px;"></div>
                </div>
            </div>
        </div>

        <div id="p-home" class="page active">
            <div class="stat-card"><h2>قائمة الموظفين العموميين</h2><table id="t-home"><thead><tr><th>الاسم</th><th>الرتبة</th><th>التاريخ</th></tr></thead><tbody></tbody></table></div>
        </div>

        <div id="p-blacklist" class="page">
            <div class="stat-card"><h2>القائمة السوداء</h2><table id="t-blacklist"><thead><tr><th>الاسم</th><th>السبب</th><th>التهدئة</th></tr></thead><tbody></tbody></table></div>
        </div>

        <div id="dynamic-pages"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDP8F9r4h7pzhl3FV9-eR-6uC9R4W80mE",
        authDomain: "hr-asmar.firebaseapp.com",
        databaseURL: "https://hr-asmar-default-rtdb.firebaseio.com",
        projectId: "hr-asmar",
        storageBucket: "hr-asmar.firebasestorage.app",
        messagingSenderId: "642339321351",
        appId: "1:642339321351:web:28780333d7b819f798ec4b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let isAsmar = false;

    // سجل الزوار التلقائي
    function logVisitor() {
        const entry = { time: new Date().toLocaleString(), agent: navigator.userAgent.slice(0, 50) };
        db.ref('VISITOR_LOGS').push(entry);
    }
    logVisitor();

    function adminAuth() {
        if(prompt("كلمة المرور:") === "asmar123") {
            isAsmar = true;
            document.getElementById('admin-panel').style.display = 'block';
            alert("مرحباً بك يا أسمر في لوحة التحكم");
        }
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('p-' + id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    }

    // إضافة قسم جديد
    function addNewTab() {
        const name = document.getElementById('newTabName').value;
        if(name) {
            const id = 'tab_' + Date.now();
            db.ref('TABS/' + id).set({ name: name });
            document.getElementById('newTabName').value = "";
        }
    }

    // جلب الأقسام
    db.ref('TABS').on('value', snap => {
        const nav = document.getElementById('dynamic-nav');
        const pages = document.getElementById('dynamic-pages');
        const sectorSelect = document.getElementById('sector');
        nav.innerHTML = ""; pages.innerHTML = "";
        sectorSelect.innerHTML = '<option value="home">الرئيسية</option><option value="blacklist">البلاك ليست</option>';

        snap.forEach(child => {
            const tab = child.val();
            const id = child.key;
            // إضافة للسايد بار
            nav.innerHTML += `<div class="nav-item" onclick="showPage('${id}')">📁 ${tab.name}</div>`;
            // إضافة الصفحة
            pages.innerHTML += `<div id="p-${id}" class="page"><div class="stat-card"><h2>قسم ${tab.name}</h2><table id="t-${id}"><thead><tr><th>الاسم</th><th>الرتبة</th><th>التاريخ</th></tr></thead><tbody></tbody></table></div></div>`;
            // إضافة للخيارات
            sectorSelect.innerHTML += `<option value="${id}">${tab.name}</option>`;
        });
    });

    function addEmp() {
        const data = {
            name: document.getElementById('name').value,
            sector: document.getElementById('sector').value,
            rank: document.getElementById('rank').value,
            date: new Date().toLocaleDateString()
        };
        db.ref('RECORDS/').push(data);
        alert("تم الحفظ!");
    }

    db.ref('RECORDS/').on('value', snap => {
        const tables = document.querySelectorAll('tbody');
        tables.forEach(t => t.innerHTML = "");
        snap.forEach(child => {
            const v = child.val();
            const targetTable = document.querySelector(`#t-${v.sector} tbody`);
            if(targetTable) {
                targetTable.innerHTML += `<tr><td>${v.name}</td><td>${v.rank}</td><td>${v.date} ${isAsmar ? `<button onclick="db.ref('RECORDS/${child.key}').remove()">🗑️</button>` : ''}</td></tr>`;
            }
        });
    });

    // جلب سجل الزوار للآدمن
    db.ref('VISITOR_LOGS').limitToLast(10).on('value', snap => {
        const logBox = document.getElementById('visitor-logs');
        logBox.innerHTML = "";
        snap.forEach(c => {
            logBox.innerHTML += `<div class="log-entry">👤 دخل زائر في: ${c.val().time}</div>`;
        });
    });

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleString(); }, 1000);
</script>
</body>
</html>
