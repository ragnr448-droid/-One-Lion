<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HR ASMAR | وزارة الموارد البشرية</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Tajawal:wght@400;700&display=swap');
        
        :root {
            --grand-bg: #1a2332; /* لون خلفية جراند */
            --grand-nav: #121926;
            --gold: #d4af37;
            --danger: #ff4655;
            --success: #00ff88;
            --white: #ffffff;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--grand-bg);
            color: var(--white);
            margin: 0;
            overflow-x: hidden;
        }

        /* الهيدر العلوي - نفس تصميم RP GRAND */
        .top-nav {
            background-color: var(--grand-nav);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            position: sticky; top: 0; z-index: 1000;
        }

        .grand-logo { font-family: 'Amiri', serif; font-size: 35px; color: var(--gold); font-weight: bold; }

        .menu-btn {
            font-size: 28px; color: var(--gold); cursor: pointer;
            padding: 5px 10px; border-radius: 5px; transition: 0.3s;
        }
        .menu-btn:hover { background: rgba(255,255,255,0.1); }

        /* القائمة الجانبية المنسدلة */
        .sidebar {
            position: fixed; top: 0; right: -100%; width: 300px; height: 100%;
            background: var(--grand-nav); z-index: 2000; transition: 0.5s ease;
            box-shadow: -5px 0 25px rgba(0,0,0,0.8); padding: 40px 20px;
            border-left: 2px solid var(--gold);
        }
        .sidebar.active { right: 0; }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; z-index: 1500;
        }
        .overlay.active { display: block; }

        /* بطاقات الأقسام - مستوحاة من صورة وزارة العدل */
        .container { padding: 20px; max-width: 1200px; margin: auto; }

        .hero-section {
            background: linear-gradient(135deg, #121926 0%, #1a2332 100%);
            border-radius: 15px; padding: 40px; text-align: center;
            border: 1px solid rgba(212, 175, 55, 0.2); margin-bottom: 30px;
        }

        .section-card {
            background: rgba(255,255,255,0.03); border-radius: 12px;
            margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .card-header {
            background: rgba(212, 175, 55, 0.1); padding: 15px;
            color: var(--gold); font-weight: bold; font-size: 1.1rem;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        /* الجداول الاحترافية */
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: rgba(0,0,0,0.2); color: var(--gold); padding: 15px; text-align: right; }
        td { padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        /* أدوات الآدمن */
        .admin-form input, .admin-form select {
            width: 100%; padding: 12px; margin: 10px 0; background: #0b121d;
            border: 1px solid var(--gold); color: white; border-radius: 5px;
        }
        .btn-grand {
            background: var(--gold); color: #121926; border: none;
            padding: 12px; width: 100%; font-weight: bold; border-radius: 5px; cursor: pointer;
        }

        .badge { padding: 4px 10px; border-radius: 4px; font-size: 0.8rem; }
        .bg-active { background: var(--success); color: #000; }
        .bg-danger { background: var(--danger); color: #fff; }

    </style>
</head>
<body>

<div class="top-nav">
    <div class="menu-btn" onclick="toggleSidebar()">☰</div>
    <div class="grand-logo">𝓗𝓡 𝓐𝓢𝓜𝓐𝓡</div>
    <div style="width: 30px;"></div>
</div>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="sidebar" id="sidebar">
    <h2 style="color: var(--gold);">⚙️ لوحة التحكم</h2>
    
    <div id="login-section">
        <input type="password" id="adminPass" placeholder="رمز الدخول الإداري" style="width:100%; padding:10px; background:#000; color:white; border:1px solid var(--gold)">
        <button class="btn-grand" style="margin-top:10px;" onclick="doLogin()">تسجيل الدخول</button>
    </div>

    <div id="admin-tools" style="display:none;" class="admin-form">
        <p style="color:var(--success)">✅ مرحباً بك يا مدير</p>
        <input type="text" id="pName" placeholder="اسم الموظف">
        <select id="pSector">
            <option value="الحكومة">🏛️ الحكومة</option>
            <option value="التحالف طبي">🏥 التحالف طبي</option>
            <option value="الجيش">🎖️ الجيش</option>
            <option value="الشرطة">🚔 الشرطة</option>
        </select>
        <input type="text" id="pRank" placeholder="الرتبة">
        <select id="pStatus">
            <option value="نشط">نشط</option>
            <option value="استقالة">استقالة</option>
            <option value="فصل">فصل (بلاك ليست)</option>
        </select>
        <button class="btn-grand" onclick="uploadData()">إرسال البيانات</button>
        <button class="btn-grand" style="background:#555; margin-top:15px;" onclick="doLogout()">تسجيل الخروج</button>
    </div>
</div>

<div class="container">
    <div class="hero-section">
        <h1 style="color: var(--gold); margin:0;">وزارة الموارد البشرية</h1>
        <p style="opacity:0.7;">نظام إدارة شؤون الموظفين - الإصدار الملكي V10</p>
    </div>

    <div id="tables-container">
        </div>
</div>

<script>
    // Firebase Config (استخدام نفس بياناتك المسجلة)
    const firebaseConfig = {
        apiKey: "AIzaSyDP8F9r4h7pzhl3FV9-eR-6uC9R4W80mE",
        databaseURL: "https://hr-asmar-default-rtdb.firebaseio.com",
        projectId: "hr-asmar"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // التحقق من تسجيل الدخول السابق (حفظ الرتبة)
    window.onload = function() {
        if(localStorage.getItem('isAsmarAdmin') === 'true') {
            showAdmin();
        }
        renderTables();
    };

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function doLogin() {
        const p = document.getElementById('adminPass').value;
        if(p === "asmar123") {
            localStorage.setItem('isAsmarAdmin', 'true');
            showAdmin();
        } else { alert("كلمة السر خاطئة!"); }
    }

    function showAdmin() {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('admin-tools').style.display = 'block';
    }

    function doLogout() {
        localStorage.removeItem('isAsmarAdmin');
        location.reload();
    }

    function uploadData() {
        const data = {
            name: document.getElementById('pName').value,
            sector: document.getElementById('pSector').value,
            rank: document.getElementById('pRank').value,
            status: document.getElementById('pStatus').value,
            date: new Date().toLocaleDateString()
        };
        db.ref('ASMAR_V10/DATA').push(data);
        alert("تم الحفظ بنجاح");
    }

    function renderTables() {
        const sectors = ["الحكومة", "التحالف طبي", "الجيش", "الشرطة", "استقالة", "فصل"];
        const container = document.getElementById('tables-container');
        
        db.ref('ASMAR_V10/DATA').on('value', snap => {
            container.innerHTML = "";
            sectors.forEach(s => {
                let html = `
                <div class="section-card">
                    <div class="card-header">${s === 'فصل' ? '🚫 القائمة السوداء' : s === 'استقالة' ? '📄 السجل الإداري الاستقالات' : s}</div>
                    <div class="table-responsive">
                        <table>
                            <thead><tr><th>الاسم</th><th>الرتبة</th><th>الحالة</th><th>التاريخ</th></tr></thead>
                            <tbody>`;
                
                snap.forEach(child => {
                    const v = child.val();
                    const isAdmin = localStorage.getItem('isAsmarAdmin') === 'true';
                    const del = isAdmin ? `<button onclick="db.ref('ASMAR_V10/DATA/${child.key}').remove()" style="background:none; border:none; color:red; cursor:pointer">🗑️</button>` : '';
                    
                    if(v.status === s || (s === 'فصل' && v.status === 'فصل') || (v.status === 'نشط' && v.sector === s)) {
                        html += `<tr><td>${v.name}</td><td>${v.rank}</td><td><span class="badge ${v.status==='نشط'?'bg-active':'bg-danger'}">${v.status}</span></td><td>${v.date} ${del}</td></tr>`;
                    }
                });

                html += `</tbody></table></div></div>`;
                container.innerHTML += html;
            });
        });
    }
</script>
</body>
</html>
