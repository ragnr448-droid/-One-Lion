<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وزارة الموارد البشرية - النظام الذكي</title>
    <style>
        /* التنسيق الأصلي - تصميم Asmar */
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; direction: rtl; }
        .mobile-container { width: 100%; max-width: 414px; background-color: #ffffff; min-height: 100vh; position: relative; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); }

        header { background-color: #1a1f36; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        
        /* كارت الهوية الشخصية */
        .user-profile { 
            display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); 
            padding: 5px 12px; border-radius: 50px; border: 1px solid rgba(196, 164, 87, 0.3);
        }
        .user-avatar { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #c4a457; object-fit: cover; }
        .user-info { display: flex; flex-direction: column; }
        .user-name { font-size: 11px; font-weight: bold; color: white; }
        .user-rank { font-size: 9px; color: #c4a457; }

        .banner { background-color: #1a1f36; color: white; padding: 25px 20px 50px 20px; text-align: center; border-radius: 0 0 40px 0; }
        .sub-title { color: #c4a457; font-size: 11px; display: block; margin-bottom: 5px; }

        .main-nav { padding: 0 20px; margin-top: -30px; display: flex; flex-direction: column; gap: 8px; z-index: 5; }
        .btn { width: 100%; padding: 12px; border-radius: 12px; font-weight: bold; font-size: 13px; cursor: pointer; border: none; transition: 0.3s; }
        .btn-gold { background: #c4a457; color: #1a1f36; }
        .btn-outline { background: white; border: 2px solid #c4a457; color: #c4a457; }
        .btn-black { background: #000; color: white; }

        #notification { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%); 
            background: #28a745; color: white; padding: 10px 25px; border-radius: 30px; 
            font-size: 12px; display: none; z-index: 5000;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .stat-card { background: white; padding: 15px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #f0f0f0; }
        .stat-card h3 { margin: 0; font-size: 24px; color: #1a1f36; }

        .page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; display: none; overflow-y: auto; }
        .p-header { background: #1a1f36; color: white; padding: 20px; display: flex; align-items: center; gap: 15px; }
        
        .item-card { background: #f8f9fa; border-right: 5px solid #c4a457; padding: 12px; margin: 8px 15px; border-radius: 8px; font-size: 13px; }
        
        footer { background: #1a1f36; color: white; text-align: center; padding: 20px; margin-top: auto; }
        .asmar-sig { color: #c4a457; font-family: cursive; font-size: 18px; display: block; margin-top: 5px; }

        input, select, textarea { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; }
        #loginScreen { position: fixed; top: 0; right: -100%; width: 100%; height: 100%; background: #1a1f36; z-index: 3000; transition: 0.4s; padding: 50px 20px; color: white; }
        
        /* معرض اختيار الصور */
        .avatar-picker { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .avatar-option { width: 100%; height: 60px; border-radius: 10px; border: 2px solid transparent; cursor: pointer; object-fit: cover; transition: 0.3s; }
        .avatar-option:hover, .avatar-option.selected { border-color: #c4a457; transform: scale(1.1); }
    </style>
</head>
<body onload="init()">

<div id="notification">تمت العملية بنجاح ✅</div>

<div class="mobile-container">
    <header>
        <div onclick="showLogin()" style="cursor:pointer; font-size:24px;">☰</div>
        
        <div class="user-profile">
            <img src="https://ui-avatars.com/api/?name=Guest&background=eee&color=666" id="profileImg" class="user-avatar">
            <div class="user-info">
                <span class="user-name" id="userNameDisp">زائر</span>
                <span class="user-rank" id="userRankDisp">رتبة: زائر</span>
            </div>
        </div>
    </header>

    <div class="banner">
        <span class="sub-title">وزارة الموارد البشرية</span>
        <h2 id="welcomeText">مرحباً بك في البوابة</h2>
    </div>

    <div class="main-nav">
        <button class="btn btn-gold" onclick="openP('staffP')">عرض الموظفين</button>
        <button class="btn btn-outline" onclick="openP('resignP')">الاستقالات (التهدئة)</button>
        <button class="btn btn-outline" onclick="openP('tasksP')">مهام المحاورين</button>
        <button class="btn btn-black" onclick="openP('blackP')">قائمة البلاك لست</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><h3 id="sNum">0</h3><p>الموظفين</p></div>
        <div class="stat-card"><h3 id="tNum">0</h3><p>المهام</p></div>
    </div>

    <footer>
        <span class="asmar-sig">Designed by Asmar</span>
    </footer>

    <div id="loginScreen">
        <span onclick="hideLogin()" style="font-size:30px; cursor:pointer;">×</span>
        <h2>تسجيل دخول الإدارة</h2>
        <input type="text" id="gmailName" placeholder="اسمك الكامل">
        <input type="password" id="pass" placeholder="كلمة السر">
        
        <p style="color:#c4a457; font-size:12px; margin-top:15px;">اختر صورتك الشخصية:</p>
        <div class="avatar-picker" id="avatarPicker">
            </div>
        
        <button class="btn btn-gold" style="margin-top:20px;" onclick="login()">دخول ومزامنة</button>
        <button class="btn btn-outline" style="margin-top:10px; color:white;" onclick="logout()">خروج</button>
    </div>

    <div id="staffP" class="page"><div class="p-header"><span onclick="closeP('staffP')">➔</span><h3>الموظفين</h3></div><div id="admS" style="display:none; padding:15px;"><input type="text" id="inName" placeholder="الاسم"><select id="inFact"><option>شرطة</option><option>جيش</option><option>تحالف طبي</option><option>الحكومة</option></select><button class="btn btn-gold" onclick="addStaff()">إضافة</button></div><div id="staffList"></div></div>
    <div id="resignP" class="page"><div class="p-header"><span onclick="closeP('resignP')">➔</span><h3>الاستقالات</h3></div><div id="admR" style="display:none; padding:15px;"><select id="rSelect"></select><button class="btn btn-gold" onclick="addResign()">تحويل</button></div><div id="resignList"></div></div>
    <div id="blackP" class="page"><div class="p-header"><span onclick="closeP('blackP')">➔</span><h3>البلاك لست</h3></div><div id="admB" style="display:none; padding:15px;"><select id="bSelect"></select><input type="text" id="bReason" placeholder="السبب"><button class="btn btn-black" onclick="addBlack()">إدراج</button></div><div id="blackList"></div></div>
    <div id="tasksP" class="page"><div class="p-header"><span onclick="closeP('tasksP')">➔</span><h3>المهام</h3></div><div id="admT" style="display:none; padding:15px;"><textarea id="tDesc"></textarea><button class="btn btn-gold" onclick="addTask()">إضافة</button></div><div id="tasksList"></div></div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('asmar_v4')) || { staff: [], resigns: [], tasks: [], black: [] };
    
    // قائمة الصور المتاحة للاختيار
    const availableAvatars = [
        "https://randomuser.me/api/portraits/men/32.jpg",
        "https://randomuser.me/api/portraits/women/44.jpg",
        "https://randomuser.me/api/portraits/men/65.jpg",
        "https://randomuser.me/api/portraits/women/68.jpg",
        "https://randomuser.me/api/portraits/men/75.jpg",
        "https://randomuser.me/api/portraits/women/91.jpg",
        "https://randomuser.me/api/portraits/men/81.jpg",
        "https://randomuser.me/api/portraits/women/50.jpg"
    ];
    
    let selectedAvatarUrl = availableAvatars[0]; // الصورة الافتراضية

    function init() {
        checkAuth();
        render();
        renderAvatarPicker();
        setInterval(renderResigns, 1000);
    }

    function checkAuth() {
        const auth = localStorage.getItem('auth');
        const name = localStorage.getItem('uName') || "زائر";
        const avatar = localStorage.getItem('uAvatar') || "https://ui-avatars.com/api/?name=Guest&background=eee&color=666";
        
        if(auth === 'admin') {
            setProfile(name, "أدمن", avatar);
            showAdmin();
        } else if(auth === 'assistant') {
            setProfile(name, "مساعد إدارة", avatar);
            showAdmin();
        } else {
            setProfile("زائر", "زائر غير مسجل", "https://ui-avatars.com/api/?name=Guest&background=eee&color=666");
        }
    }

    function setProfile(name, rank, img) {
        document.getElementById('userNameDisp').innerText = name;
        document.getElementById('userRankDisp').innerText = "رتبة: " + rank;
        document.getElementById('profileImg').src = img;
        document.getElementById('welcomeText').innerText = "مرحباً: " + name;
    }
    
    // عرض الصور في شاشة الدخول واختيارها
    function renderAvatarPicker() {
        const picker = document.getElementById('avatarPicker');
        picker.innerHTML = "";
        availableAvatars.forEach((url, index) => {
            const img = document.createElement('img');
            img.src = url;
            img.className = 'avatar-option';
            if(index === 0) img.className += ' selected'; // اختيار أول صورة افتراضياً
            img.onclick = function() { selectAvatar(this, url); };
            picker.appendChild(img);
        });
    }
    
    function selectAvatar(element, url) {
        // إزالة التحديد من كافة الصور
        const options = document.querySelectorAll('.avatar-option');
        options.forEach(opt => opt.classList.remove('selected'));
        // تحديد الصورة الحالية
        element.classList.add('selected');
        selectedAvatarUrl = url;
    }

    function login() {
        const p = document.getElementById('pass').value;
        const n = document.getElementById('gmailName').value || "مستخدم";
        if(p === "asmar123") {
            localStorage.setItem('auth', 'admin');
            localStorage.setItem('uName', n);
            localStorage.setItem('uAvatar', selectedAvatarUrl); // حفظ الصورة المختارة
            location.reload();
        } else if (p === "HR12") {
            localStorage.setItem('auth', 'assistant');
            localStorage.setItem('uName', n);
            localStorage.setItem('uAvatar', selectedAvatarUrl); // حفظ الصورة المختارة
            location.reload();
        } else { alert("خطأ في البيانات"); }
    }

    function logout() { localStorage.clear(); location.reload(); }

    function showNotify(msg) {
        const n = document.getElementById('notification');
        n.innerText = msg; n.style.display = 'block';
        setTimeout(() => n.style.display = 'none', 3000);
    }

    function showLogin() { document.getElementById('loginScreen').style.right = '0'; }
    function hideLogin() { document.getElementById('loginScreen').style.right = '-100%'; }
    function showAdmin() { ['admS', 'admR', 'admB', 'admT'].forEach(id => document.getElementById(id).style.display = 'block'); }
    function openP(id) { document.getElementById(id).style.display = 'block'; updateSelects(); }
    function closeP(id) { document.getElementById(id).style.display = 'none'; }

    function addStaff() {
        const name = document.getElementById('inName').value;
        const fact = document.getElementById('inFact').value;
        if(!name) return;
        db.staff.push({ id: Date.now(), name, fact });
        save("تم إضافة الموظف ✅");
        document.getElementById('inName').value = "";
    }

    function addResign() {
        const id = document.getElementById('rSelect').value;
        const emp = db.staff.find(s => s.id == id);
        if(!emp) return;
        db.resigns.push({ name: emp.name, end: new Date().getTime() + (3*24*60*60*1000) });
        db.staff = db.staff.filter(s => s.id != id);
        save("تم تحويل الموظف للاستقالة ✅");
    }

    function addBlack() {
        const id = document.getElementById('bSelect').value;
        const emp = db.staff.find(s => s.id == id);
        if(!emp) return;
        db.black.push({ name: emp.name, reason: document.getElementById('bReason').value });
        db.staff = db.staff.filter(s => s.id != id);
        save("تم إدراج الموظف في البلاك لست ✅");
    }

    function addTask() {
        db.tasks.push({ desc: document.getElementById('tDesc').value });
        save("تم إضافة المهمة ✅");
        document.getElementById('tDesc').value = "";
    }

    function save(msg) {
        localStorage.setItem('asmar_v4', JSON.stringify(db));
        render();
        showNotify(msg);
        updateSelects();
    }

    function updateSelects() {
        const options = db.staff.map(emp => `<option value="${emp.id}">${emp.name} (${emp.fact})</option>`).join('');
        ['rSelect', 'bSelect'].forEach(id => { if(document.getElementById(id)) document.getElementById(id).innerHTML = options; });
    }

    function render() {
        const sl = document.getElementById('staffList'); sl.innerHTML = "";
        db.staff.forEach(s => sl.innerHTML += `<div class="item-card"><span style="font-size:10px; color:#c4a457">● ${s.fact}</span><br><strong>${s.name}</strong></div>`);
        document.getElementById('sNum').innerText = db.staff.length;

        const tl = document.getElementById('tasksList'); tl.innerHTML = "";
        db.tasks.forEach((t, i) => tl.innerHTML += `<div class="item-card">مهمة #${i+1}: ${t.desc}</div>`);
        document.getElementById('tNum').innerText = db.tasks.length;

        const bl = document.getElementById('blackList'); bl.innerHTML = "";
        db.black.forEach(b => bl.innerHTML += `<div class="item-card" style="border-right-color:black;"><strong>${b.name}</strong><br><small style="color:red;">السبب: ${b.reason}</small></div>`);
        renderResigns();
    }

    function renderResigns() {
        const rl = document.getElementById('resignList'); if(!rl) return; rl.innerHTML = "";
        const now = new Date().getTime();
        db.resigns.forEach(r => {
            const diff = r.end - now;
            let txt = (diff > 0) ? `باقي: ${Math.floor(diff/86400000)}يوم و ${Math.floor((diff%86400000)/3600000)}ساعة` : "استقالة نظيفة ✅";
            rl.innerHTML += `<div class="item-card"><strong>${r.name}</strong><br><small style="color:red;">${txt}</small></div>`;
        });
    }
</script>
</body>
</html>
