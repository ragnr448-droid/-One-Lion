<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR ASMAR | GRAND RP MANAGEMENT</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Tajawal:wght@400;700&display=swap');
        :root { --accent: #ff4655; --bg: #050505; --panel: #0f1016; --glow: rgba(255, 70, 85, 0.4); }
        
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: white; margin: 0; overflow-x: hidden; }
        header { background: rgba(10, 11, 16, 0.95); padding: 15px 40px; display: flex; justify-content: space-between; border-bottom: 2px solid var(--accent); position: sticky; top:0; z-index: 1000; }
        .hr-logo { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 900; }
        .hr-logo span { color: var(--accent); text-shadow: 0 0 10px var(--accent); }

        .nav-bar { background: #0a0b10; display: flex; gap: 20px; padding: 10px 40px; border-bottom: 1px solid #1f1f27; }
        .nav-btn { color: #888; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.3s; }
        .nav-btn:hover, .nav-btn.active { color: var(--accent); }

        .main-container { padding: 30px; display: none; animation: fadeIn 0.5s; }
        .main-container.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* التنبيهات */
        #reply-alert { display: none; background: #28a745; color: white; padding: 10px; text-align: center; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        /* البطاقات */
        .card { background: var(--panel); border: 1px solid #1f1f27; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .card h2 { border-right: 4px solid var(--accent); padding-right: 15px; font-size: 1.2em; }

        input, select, textarea { background: #16171d; border: 1px solid #2a2a35; color: white; padding: 10px; width: 100%; margin: 5px 0; border-radius: 4px; box-sizing: border-box; }
        .btn { background: var(--accent); color: white; border: none; padding: 12px 20px; cursor: pointer; font-weight: bold; border-radius: 4px; }

        /* الدعم الفني */
        .support-window { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        .msg-box { height: 300px; overflow-y: auto; background: #000; padding: 15px; border-radius: 8px; border: 1px solid #222; }
        .msg { margin-bottom: 10px; padding: 8px; border-radius: 4px; font-size: 0.9em; }
        .msg.admin { border-right: 3px solid var(--accent); background: rgba(255, 70, 85, 0.05); }
        .msg.user { border-right: 3px solid #007bff; background: rgba(0, 123, 255, 0.05); }

        /* الاجتماع الصوتي */
        .voice-frame { width: 100%; height: 500px; border: none; border-radius: 12px; }
    </style>
</head>
<body>

<div id="reply-alert">⚠️ لديك رد جديد من الإدارة في قسم الدعم!</div>

<header>
    <div class="hr-logo">𝓗𝓡 <span>𝓐𝓼𝓶𝓪𝓻</span></div>
    <div id="admin-info" style="font-size: 12px; color: #555;">الوضع: زائر</div>
</header>

<div class="nav-bar">
    <div class="nav-btn active" onclick="tab('news')">📢 الفعاليات</div>
    <div class="nav-btn" onclick="tab('factions')">👥 الفصائل</div>
    <div class="nav-btn" onclick="tab('support')">🎧 الدعم الفني</div>
    <div class="nav-btn" onclick="tab('meeting')">🎙️ غرفة الاجتماعات</div>
    <div class="nav-btn" style="color: var(--accent);" onclick="login()">🔐 لوحة الإدارة</div>
</div>

<div class="container" style="padding: 20px;">
    
    <div id="news" class="main-container active">
        <div id="news-admin" style="display:none;" class="card">
            <h3>📝 إضافة فعالية جديدة</h3>
            <input type="text" id="newsTitle" placeholder="عنوان الفعالية">
            <textarea id="newsDesc" placeholder="تفاصيل الفعالية..."></textarea>
            <button class="btn" onclick="postNews()">نشر الخبر</button>
        </div>
        <div id="news-list"></div>
    </div>

    <div id="factions" class="main-container">
        <div id="faction-admin" style="display:none;" class="card">
            <h3>👥 إدارة الموظفين</h3>
            <input type="text" id="eName" placeholder="اسم اللاعب">
            <select id="eFac"><option value="army">الجيش</option><option value="police">الشرطة</option></select>
            <input type="text" id="eRank" placeholder="الرتبة">
            <button class="btn" onclick="addEmployee()">إضافة</button>
        </div>
        <div id="f-list"></div>
    </div>

    <div id="support" class="main-container">
        <div class="card">
            <h2>🎧 مركز الدعم والمساعدة</h2>
            <div class="support-window">
                <div>
                    <input type="text" id="uName" placeholder="اسمك في اللعبة">
                    <input type="text" id="uFac" placeholder="اسم فصيلك">
                    <input type="text" id="uRank" placeholder="رتبتك">
                    <textarea id="uMsg" placeholder="كيف يمكننا مساعدتك؟"></textarea>
                    <button class="btn" onclick="sendTicket()">إرسال التذكرة</button>
                </div>
                <div class="msg-box" id="chat-flow"></div>
            </div>
            <div id="admin-reply-box" style="display:none; margin-top: 20px;">
                <input type="text" id="ticketID" placeholder="رقم التذكرة للرد">
                <input type="text" id="replyText" placeholder="اكتب ردك كإداري...">
                <button class="btn" style="background:#28a745;" onclick="adminReply()">إرسال الرد</button>
            </div>
        </div>
    </div>

    <div id="meeting" class="main-container">
        <div class="card">
            <h2>🎙️ قاعة الاجتماعات الصوتية (LIVE)</h2>
            <p style="color: gray; font-size: 12px;">ملاحظة: اضغط "Join" للدخول في الاجتماع الصوتي مع الإدارة.</p>
            <iframe class="voice-frame" src="https://meet.jit.si/AsmarManagementRoom" allow="microphone; camera"></iframe>
        </div>
    </div>

</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDP8F9r4h7pzhl3FV9-eR-6uC9R4W80mE",
        databaseURL: "https://hr-asmar-default-rtdb.firebaseio.com",
        projectId: "hr-asmar"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let role = "visitor";

    function tab(id) {
        document.querySelectorAll('.main-container').forEach(c => c.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    }

    function login() {
        const pass = prompt("كلمة مرور الإدارة:");
        if(pass === "asmar123") {
            role = "super"; 
            alert("مرحباً المبرمج Asmar (صلاحيات كاملة)");
            enableAdmin(true);
        } else if(pass === "admin123") {
            role = "admin";
            alert("مرحباً أيها الإداري (صلاحيات محدودة)");
            enableAdmin(false);
        }
    }

    function enableAdmin(isSuper) {
        document.getElementById('news-admin').style.display = 'block';
        document.getElementById('faction-admin').style.display = 'block';
        document.getElementById('admin-reply-box').style.display = 'block';
        document.getElementById('admin-info').innerText = isSuper ? "الوضع: مبرمج" : "الوضع: إداري";
    }

    // نظام الأخبار
    function postNews() {
        db.ref('NEWS').push({ title: document.getElementById('newsTitle').value, desc: document.getElementById('newsDesc').value, date: new Date().toLocaleString() });
    }
    db.ref('NEWS').on('value', s => {
        const div = document.getElementById('news-list'); div.innerHTML = "";
        s.forEach(c => {
            const n = c.val();
            div.innerHTML = `<div class="card"><h4>${n.title}</h4><p>${n.desc}</p><small>${n.date}</small></div>` + div.innerHTML;
        });
    });

    // نظام الدعم
    function sendTicket() {
        const id = Date.now();
        const data = { 
            id, name: document.getElementById('uName').value, fac: document.getElementById('uFac').value, 
            rank: document.getElementById('uRank').value, msg: document.getElementById('uMsg').value, 
            status: "pending", reply: "" 
        };
        db.ref('TICKETS/' + id).set(data);
        localStorage.setItem('my_ticket', id);
        alert("تم إرسال تذكرتك بنجاح! رقمها: " + id);
    }

    function adminReply() {
        const tid = document.getElementById('ticketID').value;
        const txt = document.getElementById('replyText').value;
        db.ref('TICKETS/' + tid).update({ reply: txt, status: "replied" });
    }

    // مراقبة الردود للزائر
    setInterval(() => {
        const myID = localStorage.getItem('my_ticket');
        if(myID) {
            db.ref('TICKETS/' + myID).once('value', s => {
                if(s.val() && s.val().status === "replied") {
                    document.getElementById('reply-alert').style.display = 'block';
                    const chat = document.getElementById('chat-flow');
                    chat.innerHTML = `<div class="msg user"><b>أنت:</b> ${s.val().msg}</div><div class="msg admin"><b>الآدمن:</b> ${s.val().reply}</div>`;
                }
            });
        }
    }, 3000);

    db.ref('TICKETS').on('value', s => {
        if(role !== "visitor") {
            const chat = document.getElementById('chat-flow'); chat.innerHTML = "<b>تذاكر نشطة:</b><br>";
            s.forEach(c => {
                const t = c.val();
                chat.innerHTML += `<div class="msg ${t.status}">ID: ${t.id} | ${t.name} (${t.fac}): ${t.msg}</div>`;
            });
        }
    });
</script>
</body>
</html>
