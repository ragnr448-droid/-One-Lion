<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وزارة الموارد البشرية | المبرمج Asmar</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        :root { --main-blue: #0d1b2a; --gold-accent: #e0e1dd; --admin-red: #8b0000; --glass: rgba(255, 255, 255, 0.95); }
        body { font-family: 'Segoe UI', sans-serif; background: #e0e1dd; margin: 0; transition: 0.3s; }
        
        /* الهيدر المزخرف */
        header { background: var(--main-blue); color: white; padding: 20px; text-align: center; border-bottom: 4px solid #1b263b; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .logo-hr { font-size: 40px; font-weight: bold; font-family: 'Georgia', serif; }
        .logo-hr span { color: #778da9; font-style: italic; }
        
        /* الملاحة */
        nav { background: #1b263b; display: flex; justify-content: center; padding: 10px; position: sticky; top: 0; z-index: 1000; }
        nav button { background: none; border: none; color: white; margin: 0 15px; padding: 10px 20px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        nav button:hover, nav button.active { background: #415a77; border-radius: 8px; }

        .container { max-width: 1200px; margin: 20px auto; padding: 20px; }
        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* الكروت والجداول */
        .card { background: var(--glass); border-radius: 15px; padding: 25px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.3); }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
        th { background: #415a77; color: white; padding: 15px; text-align: right; }
        td { padding: 15px; border-bottom: 1px solid #eee; }

        /* فورم الإدارة */
        .admin-panel { display: none; background: #f1f2f6; border-right: 10px solid var(--main-blue); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, select, textarea { padding: 12px; border-radius: 8px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; font-size: 14px; }
        .btn-save { grid-column: span 2; background: #1b263b; color: white; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }

        /* الدعم الفني الداخلي */
        #support-container { position: fixed; bottom: 20px; left: 20px; width: 320px; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: none; flex-direction: column; z-index: 2000; overflow: hidden; border: 1px solid #ddd; }
        #chat-header { background: var(--main-blue); color: white; padding: 15px; font-weight: bold; display: flex; justify-content: space-between; }
        #chat-msgs { height: 250px; overflow-y: auto; padding: 15px; background: #f9f9f9; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 80%; font-size: 13px; }
        .msg.admin { background: #d1e7dd; align-self: flex-start; }
        .msg.user { background: #e2e3e5; align-self: flex-end; }

        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .bg-active { background: #d4edda; color: #155724; }
        .bg-black { background: #f8d7da; color: #721c24; }

        #site-img { width: 100%; max-height: 250px; object-fit: cover; border-radius: 15px; margin-bottom: 20px; display: none; }
    </style>
</head>
<body>

<header>
    <div class="logo-hr">𝓗𝓡 <span>𝓐𝓼𝓶𝓪𝓻</span></div>
    <div style="letter-spacing: 2px; font-size: 14px;">وزارة الموارد البشرية - النظام المركزي</div>
</header>

<nav>
    <button id="nav-home" class="active" onclick="switchPage('home')">🏠 شؤون الموظفين</button>
    <button id="nav-blacklist" onclick="switchPage('blacklist')">🚫 القائمة السوداء</button>
    <button id="nav-admin" onclick="authAdmin()">🔐 لوحة التحكم</button>
</nav>

<div class="container">
    <img id="site-img" src="" alt="صورة الإدارة">

    <div id="page-home" class="page active">
        <div id="admin-form-container" class="card admin-panel">
            <h3>⚙️ إدارة السجلات - المبرمج Asmar</h3>
            <div class="form-grid">
                <input type="text" id="empName" placeholder="اسم الموظف">
                <select id="empSector" onchange="loadRanks()">
                    <option value="">نوع القطاع</option>
                    <option value="عسكري">🎖️ عسكري</option>
                    <option value="طبي">🏥 طبي</option>
                    <option value="حكومي">🏛️ حكومي</option>
                </select>
                <select id="empRank"><option>الرتبة</option></select>
                <select id="empStatus" onchange="togglePenaltyFields()">
                    <option value="نشط">✅ نشط</option>
                    <option value="استقالة">📄 استقالة</option>
                    <option value="فصل">❌ فصل</option>
                </select>
                <div id="penalty-fields" style="display:none; grid-column: span 2;">
                    <textarea id="reason" placeholder="سبب الإجراء..." style="margin-bottom:10px;"></textarea>
                    <div class="form-grid">
                        <input type="text" id="penalty" placeholder="العقوبة المطبقة">
                        <input type="number" id="cooldown" placeholder="فترة التهدئة (بالأيام)">
                    </div>
                </div>
                <input type="text" id="imgUrl" placeholder="رابط صورة لتغيير واجهة الموقع (اختياري)" class="full-width">
                <button class="btn-save" onclick="saveData()">إرسال البيانات إلى السحابة</button>
            </div>
        </div>

        <div class="card">
            <h3>📋 قائمة الموظفين النشطين</h3>
            <table>
                <thead>
                    <tr><th>الاسم</th><th>القطاع</th><th>الرتبة</th><th>الحالة</th><th>تاريخ الإضافة</th></tr>
                </thead>
                <tbody id="home-table"></tbody>
            </table>
        </div>
    </div>

    <div id="page-blacklist" class="page">
        <div class="card" style="border-top: 6px solid var(--admin-red);">
            <h2 style="color:var(--admin-red)">🚫 السجل الأسود وفترات التهدئة</h2>
            <table>
                <thead>
                    <tr><th>الاسم</th><th>النوع</th><th>السبب</th><th>العقوبة</th><th>التهدئة</th><th>الإجراء</th></tr>
                </thead>
                <tbody id="black-table"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="support-container">
    <div id="chat-header"><span>💬 الدعم الفني الداخلي</span> <span onclick="toggleSupport()" style="cursor:pointer">×</span></div>
    <div id="chat-msgs"></div>
    <div style="display:flex; border-top:1px solid #ddd;">
        <input type="text" id="userMsg" placeholder="اكتب رسالتك..." style="border:none; flex:1; padding:10px;">
        <button onclick="sendSupportMsg()" style="background:var(--main-blue); color:white; border:none; padding:10px 15px;">إرسال</button>
    </div>
</div>
<button onclick="toggleSupport()" style="position:fixed; bottom:20px; left:20px; width:60px; height:60px; border-radius:50%; background:var(--main-blue); color:white; border:none; font-size:24px; cursor:pointer; box-shadow:0 5px 15px rgba(0,0,0,0.3); z-index:1900;">💬</button>

<script>
    // Firebase Setup
    const firebaseConfig = {
        apiKey: "AIzaSyDP8F9r4h7pzhl3FV9-eR-6uC9R4W80mE",
        authDomain: "hr-asmar.firebaseapp.com",
        databaseURL: "https://hr-asmar-default-rtdb.firebaseio.com",
        projectId: "hr-asmar",
        storageBucket: "hr-asmar.firebasestorage.app",
        messagingSenderId: "642339321351",
        appId: "1:642339321351:web:28780333d7b819f798ec4b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let isAdmin = false;

    // التنقل بين الصفحات
    function switchPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        document.getElementById('nav-' + pageId).classList.add('active');
    }

    function authAdmin() {
        let p = prompt("أدخل رمز الدخول للمبرمج Asmar:");
        if(p === "asmar123") {
            isAdmin = true;
            document.getElementById('admin-form-container').style.display = 'block';
            switchPage('home');
        }
    }

    function loadRanks() {
        const sector = document.getElementById('empSector').value;
        const rankSelect = document.getElementById('empRank');
        rankSelect.innerHTML = "";
        const ranks = {
            "عسكري": ["جندي", "عريف", "رقيب", "ملازم", "نقيب", "عقيد"],
            "طبي": ["مساعد", "ممرض", "طبيب", "استشاري", "مدير طبابة"],
            "حكومي": ["موظف", "إداري", "رئيس قسم", "وكيل", "وزير"]
        };
        if(ranks[sector]) ranks[sector].forEach(r => rankSelect.innerHTML += `<option value="${r}">${r}</option>`);
    }

    function togglePenaltyFields() {
        const status = document.getElementById('empStatus').value;
        const fields = document.getElementById('penalty-fields');
        fields.style.display = (status === "نشط") ? "none" : "block";
        if(status === "استقالة") document.getElementById('cooldown').value = 3;
    }

    function saveData() {
        const data = {
            name: document.getElementById('empName').value,
            sector: document.getElementById('empSector').value,
            rank: document.getElementById('empRank').value,
            status: document.getElementById('empStatus').value,
            reason: document.getElementById('reason').value || "لا يوجد",
            penalty: document.getElementById('penalty').value || "لا يوجد",
            cooldown: document.getElementById('cooldown').value || 0,
            date: new Date().toLocaleDateString(),
            timestamp: Date.now()
        };
        
        const img = document.getElementById('imgUrl').value;
        if(img) db.ref('SITE_CONFIG/img').set(img);

        db.ref('HR_RECORDS/').push(data);
        alert("تم الحفظ بنجاح يا Asmar");
    }

    // جلب البيانات
    db.ref('HR_RECORDS/').on('value', snap => {
        const homeTable = document.getElementById('home-table');
        const blackTable = document.getElementById('black-table');
        homeTable.innerHTML = ""; blackTable.innerHTML = "";
        
        snap.forEach(child => {
            const item = child.val();
            const id = child.key;
            if(item.status === "نشط") {
                homeTable.innerHTML += `<tr><td>${item.name}</td><td>${item.sector}</td><td>${item.rank}</td><td><span class="status-pill bg-active">نشط</span></td><td>${item.date} ${isAdmin ? `<button onclick="deleteRecord('${id}')">🗑️</button>` : ''}</td></tr>`;
            } else {
                blackTable.innerHTML += `<tr><td>${item.name}</td><td>${item.status}</td><td>${item.reason}</td><td>${item.penalty}</td><td>${item.cooldown} يوم</td><td>${isAdmin ? `<button onclick="deleteRecord('${id}')">🗑️</button>` : 'محمي'}</td></tr>`;
            }
        });
    });

    function deleteRecord(id) { if(confirm("حذف السجل؟")) db.ref('HR_RECORDS/' + id).remove(); }

    db.ref('SITE_CONFIG/img').on('value', snap => {
        if(snap.val()) {
            document.getElementById('site-img').src = snap.val();
            document.getElementById('site-img').style.display = 'block';
        }
    });

    // نظام الشات
    function toggleSupport() {
        const chat = document.getElementById('support-container');
        chat.style.display = (chat.style.display === 'flex') ? 'none' : 'flex';
    }

    function sendSupportMsg() {
        const txt = document.getElementById('userMsg').value;
        if(txt) {
            db.ref('SUPPORT_MSGS/').push({ msg: txt, sender: isAdmin ? 'admin' : 'user', time: Date.now() });
            document.getElementById('userMsg').value = "";
        }
    }

    db.ref('SUPPORT_MSGS/').limitToLast(10).on('value', snap => {
        const box = document.getElementById('chat-msgs');
        box.innerHTML = "";
        snap.forEach(c => {
            const m = c.val();
            box.innerHTML += `<div class="msg ${m.sender}">${m.msg}</div>`;
        });
        box.scrollTop = box.scrollHeight;
    });
</script>
</body>
</html>
