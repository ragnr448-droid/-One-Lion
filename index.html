<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وزارة الموارد البشرية - المشرع المباشر</title>
    <style>
        body {
            font-family: 'Cairo', sans-serif; /* خط عربي أنيق */
            background-color: #1a1a1a; /* خلفية داكنة مثل المنتديات الاحترافية */
            margin: 0;
            padding: 20px;
            color: #e0e0e0;
        }

        .container { max-width: 900px; margin: 0 auto; }

        /* --- تأثير اللمعان للرتبة --- */
        .rank-hr {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            background: linear-gradient(270deg, #27ae60, #2ecc71, #27ae60);
            background-size: 400% 400%;
            color: #fff;
            animation: moveGradient 3s infinite;
            border: 1px solid rgba(255,255,255,0.2);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- تنسيق البلوكات --- */
        .block {
            background: #242526;
            border: 1px solid #3e4042;
            border-radius: 8px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .block-header {
            background: #3a3b3c;
            padding: 15px;
            font-size: 18px;
            border-bottom: 1px solid #3e4042;
            color: #45bd62; /* أخضر الوزارة */
        }

        /* --- تنسيق الروابط والأزرار --- */
        .node-row {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #3e4042;
            text-decoration: none;
            color: #e4e6eb;
            transition: 0.3s;
        }

        .node-row:hover { background: #3a3b3c; transform: translateX(-5px); }

        .label {
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .label-red { background: #f02849; color: #fff; }
        .label-yellow { background: #f7b928; color: #1c1e21; }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 20px;
        }

        .hr-btn {
            background: #4e5d7e;
            color: #ffffff !important;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            border-bottom: 3px solid #2c3e50;
        }

        .hr-btn:hover {
            background: #607d8b;
            transform: translateY(-3px);
            border-bottom-color: #1a252f;
        }

    </style>
</head>
<body>

<div class="container">

    <div class="block" style="text-align: center; padding: 20px;">
        <div class="rank-hr">وزارة الموارد البشرية - مدير القسم</div>
        <p>مرحباً بك في البوابة الرسمية للتوظيف</p>
    </div>

    <div class="block">
        <h2 class="block-header">الأقسام والطلبات</h2>
        <div class="block-body">
            <a href="https://google.com" class="node-row">
                <span class="label label-red">هام</span>
                <div style="margin-right: 15px;">قوانين العمل والتوظيف لعام 2026</div>
            </a>
            
            <a href="mailto:admin@example.com" class="node-row">
                <span class="label label-yellow">قيد المراجعة</span>
                <div style="margin-right: 15px;">طلبات الترقية المقدمة مؤخراً</div>
            </a>
        </div>
    </div>

    <div class="block">
        <h2 class="block-header">لوحة التحكم السريعة</h2>
        <div class="grid-container">
            <a href="https://forms.gle/XXXXX" target="_blank" class="hr-btn">تقديم طلب انضمام (Google Forms)</a>
            <a href="rules.html" class="hr-btn">قوانين الوزارة</a>
            <a href="archive.html" class="hr-btn">أرشيف القرارات</a>
            <a href="https://discord.gg/yourlink" target="_blank" class="hr-btn">الدعم الفني (Discord)</a>
        </div>
    </div>

</div>

</body>
</html>
