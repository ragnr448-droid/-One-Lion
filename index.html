<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة وزارة الموارد البشرية | المطور الذكي</title>
    <style>
        :root { --primary: #0b1a30; --gold: #c5a059; --bg: #f4f7f6; --danger: #dc3545; --success: #28a745; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; color: #333; }
        header { background: var(--primary); color: white; padding: 20px; border-bottom: 5px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 900px; margin: 20px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; border: none; transition: 0.3s; width: 100%; }
        .btn-gold { background: var(--gold); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-admin { background: rgba(255,255,255,0.1); color: white; border: 1px solid white; width: auto; }
        .hidden { display: none; }
        .card { background: #f9f9f9; padding: 15px; border-right: 5px solid var(--gold); margin-bottom: 15px; border-radius: 0 8px 8px 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: var(--primary); color: white; padding: 10px; }
        td { border-bottom: 1px solid #eee; padding: 10px; text-align: center; }
        .cooldown-active { background: #fff3cd; color: #856404; padding: 20px; border-radius: 10px; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

<header>
    <div>
        <h2 style="margin:0;">وزارة الموارد البشرية</h2>
        <small>الإدارة العامة لشؤون الفصائل</small>
    </div>
    <button class="btn btn-admin" onclick="toggleAdminView()">دخول الإدارة</button>
</header>

<div id="userPortal" class="container">
    <div id="cdBanner" class="cooldown-active hidden">🛑 نظام التهدئة نشط على حسابك حالياً.</div>

    <div id="testForm">
        <h3>تقديم طلب جديد</h3>
        <input type="text" id="app_name" placeholder="اسمك في الفصيل (يجب أن يكون دقيقاً) *">
        <select id="app_faction" onchange="loadQs()">
            <option value="">-- اختر الفصيل --</option>
            <option value="government">الحكومة</option>
            <option value="police">الشرطة</option>
            <option value="medical">التحالف الطبي</option>
            <option value="army">الجيش</option>
        </select>
        <div id="qsBox"></div>
        <button class="btn btn-gold" onclick="sendApp()">إرسال الطلب</button>
    </div>

    <h3 style="margin-top:40px;">نتائج القبول المبدئي</h3>
    <table id="publicResults">
        <thead><tr><th>المتقدم</th><th>الفصيل</th><th>الحالة</th></tr></thead>
        <tbody></tbody>
    </table>
</div>

<div id="adminPortal" class="container hidden">
    <div id="adminLogin">
        <h3 style="text-align:center;">دخول الموظفين المصرح لهم</h3>
        <input type="password" id="passInput" placeholder="أدخل كلمة المرور">
        <button class="btn btn-gold" onclick="checkAuth()">دخول النظام</button>
    </div>

    <div id="adminDashboard" class="hidden">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
            <div class="card">
                <h3>📥 طلبات التوظيف</h3>
                <div id="appsList"></div>
            </div>

            <div class="card" style="border-color: var(--danger);">
                <h3>🚫 إدارة الاستقالات والتهدئة</h3>
                <label>اسم الشخص المستقيل:</label>
                <input type="text" id="res_name" placeholder="الاسم الكامل">
                <label>فصيله الحالي:</label>
                <select id="res_faction">
                    <option value="government">الحكومة</option>
                    <option value="police">الشرطة</option>
                    <option value="medical">التحالف الطبي</option>
                    <option value="army">الجيش</option>
                </select>
                <button class="btn btn-danger" onclick="applyManualCD()">تفعيل الكولد داون فوراً</button>
                
                <h4 style="margin-top:20px;">سجل التهدئة النشط:</h4>
                <div id="cdList"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const factionQs = {
        "government": ["ما هو دور المحاور؟", "قانون السلوك المهني (GOV-A1)؟", "بروتوكول التعامل مع المراجعين؟"],
        "police": ["ما هو دور المحاور؟", "قانون استخدام القوة (PD-A9)؟", "حالات التفتيش القانونية (PD-A8)؟"],
        "medical": ["ما هو دور المحاور؟", "قانون التعامل مع الحالات الجسيمة (MED-A7)؟", "قوانين حمل السلاح للمسعف (MED-A9)؟"],
        "army": ["ما هو دور المحاور؟", "قانون جودة التمثيل العسكري (ARM-A5)؟", "قانون الالتزام بالأوامر (ARM-A7)؟"]
    };

    function toggleAdminView() {
        document.getElementById('userPortal').classList.toggle('hidden');
        document.getElementById('adminPortal').classList.toggle('hidden');
    }

    function checkAuth() {
        // كلمة السر مخفية تماماً في الكود ولا تظهر للمستخدم
        if(document.getElementById('passInput').value === "asmar123") {
            document.getElementById('adminLogin').classList.add('hidden');
            document.getElementById('adminDashboard').classList.remove('hidden');
            renderAdminContent();
        } else { alert("كلمة المرور غير صحيحة!"); }
    }

    function loadQs() {
        const f = document.getElementById('app_faction').value;
        const b = document.getElementById('qsBox');
        b.innerHTML = "";
        if(f) factionQs[f].forEach((q, i) => {
            b.innerHTML += `<div class="card"><strong>س${i+1}: ${q}</strong><textarea class="ans"></textarea></div>`;
        });
    }

    function sendApp() {
        const name = document.getElementById('app_name').value;
        const faction = document.getElementById('app_faction').value;
        const answers = Array.from(document.querySelectorAll('.ans')).map(t => t.value);
        
        if(!name || !faction) return alert("الرجاء تعبئة الاسم والفصيل");

        // فحص إذا كان الاسم تحت الكولد داون
        let cooldowns = JSON.parse(localStorage.getItem('f_cooldowns') || '[]');
        if(cooldowns.includes(name)) return alert("عذراً، اسمك مدرج في قائمة التهدئة حالياً.");

        let apps = JSON.parse(localStorage.getItem('f_apps') || '[]');
        apps.push({ name, faction, answers, score: null });
        localStorage.setItem('f_apps', JSON.stringify(apps));
        alert("تم إرسال طلبك!");
        location.reload();
    }

    function applyManualCD() {
        const name = document.getElementById('res_name').value;
        if(!name) return alert("أدخل اسم الشخص");
        
        let cooldowns = JSON.parse(localStorage.getItem('f_cooldowns') || '[]');
        if(!cooldowns.includes(name)) cooldowns.push(name);
        
        localStorage.setItem('f_cooldowns', JSON.stringify(cooldowns));
        alert("تم تفعيل الكولد داون بنجاح لـ " + name);
        renderAdminContent();
    }

    function removeCD(name) {
        let cooldowns = JSON.parse(localStorage.getItem('f_cooldowns') || '[]');
        cooldowns = cooldowns.filter(n => n !== name);
        localStorage.setItem('f_cooldowns', JSON.stringify(cooldowns));
        renderAdminContent();
    }

    function renderAdminContent() {
        // عرض الطلبات
        const apps = JSON.parse(localStorage.getItem('f_apps') || '[]');
        const list = document.getElementById('appsList');
        list.innerHTML = apps.filter(a => a.score === null).map((a, i) => `
            <div class="card">
                <b>${a.name} - ${a.faction}</b>
                <button onclick="alert('الأجوبة: ${a.answers.join(' | ')}')">رؤية الأجوبة</button>
                <input type="number" id="sc_${i}" placeholder="الدرجة">
                <button onclick="saveScore(${i})">حفظ</button>
            </div>
        `).join('') || "لا يوجد طلبات حالياً";

        // عرض قائمة الكولد داون
        const cooldowns = JSON.parse(localStorage.getItem('f_cooldowns') || '[]');
        const cdList = document.getElementById('cdList');
        cdList.innerHTML = cooldowns.map(name => `
            <div style="display:flex; justify-content:space-between; padding:5px; background:#fff; margin:2px;">
                <span>${name}</span>
                <button style="color:red; border:none; cursor:pointer;" onclick="removeCD('${name}')">حذف ❌</button>
            </div>
        `).join('') || "القائمة فارغة";
    }

    function saveScore(idx) {
        let apps = JSON.parse(localStorage.getItem('f_apps'));
        apps[idx].score = document.getElementById(`sc_${idx}`).value;
        localStorage.setItem('f_apps', JSON.stringify(apps));
        renderAdminContent();
        renderPublicResults();
    }

    function renderPublicResults() {
        const apps = JSON.parse(localStorage.getItem('f_apps') || '[]');
        const tbody = document.querySelector('#publicResults tbody');
        tbody.innerHTML = apps.map(a => `
            <tr>
                <td>${a.name}</td>
                <td>${a.faction}</td>
                <td style="color:${a.score >= 70 ? 'green':'red'}">${a.score === null ? 'بانتظار الإدارة' : (a.score >= 70 ? 'ناجح ✅' : 'راسب ❌')}</td>
            </tr>
        `).join('');
    }

    renderPublicResults();
</script>
</body>
</html>
