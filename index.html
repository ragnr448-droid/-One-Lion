<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وزارة الموارد البشرية - نظام Asmar المتكامل</title>
    <style>
        /* التنسيق الأصلي الفاخر */
        * { box-sizing: border-box; }
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; margin: 0; direction: rtl; }
        .mobile-container { width: 100%; max-width: 414px; background: #fff; min-height: 100vh; margin: auto; position: relative; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        header { background: #1a1f36; color: white; padding: 25px 15px; display: flex; justify-content: space-between; align-items: center; }
        .logo-area h1 { font-size: 18px; margin: 0; }
        .logo-area p { font-size: 10px; color: #c4a457; margin: 0; }

        .banner { background: #1a1f36; color: white; padding: 30px 20px 50px; text-align: center; border-radius: 0 0 40px 0; }
        .status-badge { background: #2ecc71; color: white; font-size: 10px; padding: 5px 10px; border-radius: 20px; display: none; margin-bottom: 10px; }

        .main-nav { padding: 0 20px; margin-top: -30px; display: flex; flex-direction: column; gap: 8px; }
        .btn { width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; font-size: 13px; cursor: pointer; border: none; transition: 0.3s; text-align: center; }
        .btn-gold { background: #c4a457; color: #1a1f36; }
        .btn-outline { background: white; border: 2px solid #c4a457; color: #c4a457; }
        .btn-black { background: #000; color: #fff; }

        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; }
        .s-card { background: white; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #eee; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .s-card h3 { margin: 0; font-size: 24px; color: #1a1f36; }

        /* الصفحات */
        .page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; display: none; overflow-y: auto; }
        .p-head { background: #1a1f36; color: white; padding: 20px; display: flex; align-items: center; gap: 15px; position: sticky; top: 0; }
        
        .item { background: #f8f9fa; border-right: 4px solid #c4a457; padding: 12px; margin: 10px 15px; border-radius: 8px; font-size: 13px; }
        .timer { color: #e74c3c; font-weight: bold; display: block; margin-top: 5px; }

        /* المدخلات */
        .admin-box { background: #f0f2f5; padding: 15px; margin: 10px; border-radius: 10px; display: none; }
        input, select, textarea { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; }

        footer { background: #1a1f36; color: white; text-align: center; padding: 20px; margin-top: auto; }
        .sig { color: #c4a457; font-family: cursive; font-size: 18px; margin-top: 5px; display: block; }
    </style>
</head>
<body onload="init()">

<div class="mobile-container">
    <header>
        <div onclick="openLogin()" style="cursor:pointer; font-size:22px;">☰</div>
        <div class="logo-area">
            <h1>وزارة الموارد البشرية</h1>
            <p>بوابة الخدمات الإلكترونية</p>
        </div>
    </header>

    <div class="banner">
        <div id="adminStatus" class="status-badge">● تم تسجيل دخول الإدارة</div>
        <span style="color:#c4a457; font-size:12px;">البوابة الرقمية الرسمية</span>
        <h2>نظام إدارة الفصائل</h2>
    </div>

    <div class="main-nav">
        <button class="btn btn-gold" onclick="openP('staffP')">عرض الموظفين والرتب</button>
        <button class="btn btn-outline" onclick="openP('resignP')">الاستقالات (3 أيام تهدئة)</button>
        <button class="btn btn-outline" onclick="openP('fineP')">نظام المخالفات (تهدئة مخصصة)</button>
        <button class="btn btn-outline" onclick="openP('taskP')">مهام المحاورين</button>
        <button class="btn btn-black" onclick="openP('blackP')">قائمة البلاك لست</button>
    </div>

    <div class="stats">
        <div class="s-card"><h3 id="sCount">0</h3><p>الموظفين</p></div>
        <div class="s-card"><h3 id="fCount">0</h3><p>المخالفات</p></div>
    </div>

    <footer>
        <p>© 2026 جميع الحقوق محفوظة</p>
        <span class="sig">Designed by Asmar</span>
    </footer>

    <div id="loginScreen" style="position:fixed; top:0; right:-100%; width:100%; height:100%; background:#1a1f36; z-index:3000; transition:0.4s; padding:50px; color:white;">
        <span onclick="closeLogin()" style="font-size:30px; cursor:pointer;">×</span>
        <h2>تسجيل دخول الإدارة</h2>
        <input type="password" id="pass" placeholder="كلمة السر...">
        <button class="btn btn-gold" onclick="login()">دخول</button>
    </div>

    <div id="staffP" class="page">
        <div class="p-head"><span onclick="closeP('staffP')">➔</span><h3>الموظفين والرتب</h3></div>
        <div class="admin-box" id="aStaff">
            <input type="text" id="sn" placeholder="الاسم">
            <select id="sf"><option>الشرطة</option><option>الجيش</option><option>التحالف الطبي</option><option>الحكومة</option></select>
            <input type="text" id="sr" placeholder="الرتبة">
            <button class="btn btn-gold" onclick="addS()">إضافة</button>
        </div>
        <div id="sl"></div>
    </div>

    <div id="fineP" class="page">
        <div class="p-head"><span onclick="closeP('fineP')">➔</span><h3>نظام المخالفات</h3></div>
        <div class="admin-box" id="aFine">
            <input type="text" id="fn" placeholder="اسم المخالف">
            <input type="number" id="fd" placeholder="مدة التهدئة (بالأيام)">
            <textarea id="fr" placeholder="سبب المخالفة"></textarea>
            <button class="btn btn-gold" onclick="addF()">إصدار مخالفة</button>
        </div>
        <div id="fl"></div>
    </div>

    <div id="resignP" class="page"><div class="p-head"><span onclick="closeP('resignP')">➔</span><h3>الاستقالات</h3></div><div class="admin-box" id="aResign"><input type="text" id="rn"><button class="btn btn-gold" onclick="addR()">بدء تهدئة</button></div><div id="rl"></div></div>
    <div id="taskP" class="page"><div class="p-head"><span onclick="closeP('taskP')">➔</span><h3>المهام</h3></div><div class="admin-box" id="aTask"><textarea id="td"></textarea><button class="btn btn-gold" onclick="addT()">إضافة مهمة</button></div><div id="tl"></div></div>
    <div id="blackP" class="page"><div class="p-head"><span onclick="closeP('blackP')">➔</span><h3>البلاك لست</h3></div><div class="admin-box" id="aBlack"><input type="text" id="bn"><input type="text" id="br"><button class="btn btn-black" onclick="addB()">حظر</button></div><div id="bl"></div></div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('asmar_v3')) || { s:[], r:[], t:[], b:[], f:[] };

    function init() {
        if(localStorage.getItem('isAsmarAdmin') === 'true') {
            document.getElementById('adminStatus').style.display = 'block';
            document.querySelectorAll('.admin-box').forEach(b => b.style.display = 'block');
        }
        render();
        setInterval(renderTimers, 1000);
    }

    function openLogin() { document.getElementById('loginScreen').style.right = '0'; }
    function closeLogin() { document.getElementById('loginScreen').style.right = '-100%'; }
    
    function login() {
        if(["asmar123", "HR12"].includes(document.getElementById('pass').value)) {
            localStorage.setItem('isAsmarAdmin', 'true');
            location.reload();
        }
    }

    function openP(id) { document.getElementById(id).style.display = 'block'; }
    function closeP(id) { document.getElementById(id).style.display = 'none'; }

    function addS() { db.s.push({n:document.getElementById('sn').value, f:document.getElementById('sf').value, r:document.getElementById('sr').value}); save(); }
    function addF() { 
        const days = document.getElementById('fd').value;
        const end = new Date().getTime() + (days * 24 * 60 * 60 * 1000);
        db.f.push({n:document.getElementById('fn').value, r:document.getElementById('fr').value, e:end}); 
        save(); 
    }
    function addR() { db.r.push({n:document.getElementById('rn').value, e:new Date().getTime() + (3*24*60*60*1000)}); save(); }
    function addT() { db.t.push({d:document.getElementById('td').value}); save(); }
    function addB() { db.b.push({n:document.getElementById('bn').value, r:document.getElementById('br').value}); save(); }

    function save() { localStorage.setItem('asmar_v3', JSON.stringify(db)); render(); }

    function render() {
        document.getElementById('sl').innerHTML = db.s.map(i => `<div class="item"><strong>${i.n}</strong><br>الفصيل: ${i.f} | الرتبة: ${i.r}</div>`).join('');
        document.getElementById('tl').innerHTML = db.t.map((i,idx) => `<div class="item">مهمة #${idx+1}: ${i.d}</div>`).join('');
        document.getElementById('bl').innerHTML = db.b.map(i => `<div class="item" style="border-color:#000"><strong>${i.n}</strong><br>السبب: ${i.r}</div>`).join('');
        document.getElementById('sCount').innerText = db.s.length;
        document.getElementById('fCount').innerText = db.f.length;
        renderTimers();
    }

    function renderTimers() {
        const now = new Date().getTime();
        document.getElementById('rl').innerHTML = db.r.map(i => {
            const d = i.e - now;
            return `<div class="item"><strong>${i.n}</strong><span class="timer">${d > 0 ? formatTime(d) : 'استقالة نظيفة'}</span></div>`;
        }).join('');
        
        document.getElementById('fl').innerHTML = db.f.map(i => {
            const d = i.e - now;
            return `<div class="item"><strong>المخالف: ${i.n}</strong><br><small>السبب: ${i.r}</small><span class="timer">${d > 0 ? 'مدة التهدئة: ' + formatTime(d) : 'انتهت العقوبة'}</span></div>`;
        }).join('');
    }

    function formatTime(ms) {
        const h = Math.floor(ms / 3600000);
        const m = Math.floor((ms % 3600000) / 60000);
        const s = Math.floor((ms % 60000) / 1000);
        return `${h} ساعة و ${m} دقيقة و ${s} ثانية`;
    }
</script>
</body>
</html>
