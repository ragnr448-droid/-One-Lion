<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>وزارة الموارد البشرية | HR ASMAR</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Tajawal:wght@400;700&display=swap');
        
        :root {
            --gov-blue: #0b1e33;
            --gold: #d4af37;
            --dark-bg: #050c14;
            --panel-bg: rgba(16, 33, 54, 0.95);
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            margin: 0;
            overflow-x: hidden;
        }

        /* إصلاح الهيدر واللوجو */
        header {
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(to bottom, var(--gov-blue), var(--dark-bg));
            border-bottom: 2px solid var(--gold);
        }

        .hr-main-logo {
            font-family: 'Amiri', serif;
            font-size: 5rem;
            color: var(--gold);
            margin: 0;
            text-shadow: 0 0 25px rgba(212, 175, 55, 0.6);
            line-height: 1;
        }

        .gov-title {
            color: var(--gold);
            font-size: 1.2rem;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        /* القائمة الجانبية المطورة (إصلاح التداخل) */
        .sidebar {
            position: fixed; top: 0; right: -100%;
            width: 85%; max-width: 320px; height: 100%;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            z-index: 9999;
            transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            box-shadow: -10px 0 30px rgba(0,0,0,0.8);
            padding: 30px 20px;
        }

        .sidebar.active { right: 0; }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; z-index: 9998;
        }
        .overlay.active { display: block; }

        /* أيقونة المنيو */
        .menu-icon {
            position: fixed; top: 20px; right: 20px;
            z-index: 10000; cursor: pointer;
            background: var(--gold); color: var(--gov-blue);
            padding: 10px; border-radius: 8px; font-size: 24px;
        }

        /* تنسيق الجداول (إصلاح العرض على الجوال) */
        .container { padding: 20px; max-width: 1200px; margin: auto; }

        .section-box {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            overflow: hidden;
        }

        .section-header {
            background: rgba(212, 175, 55, 0.1);
            padding: 15px;
            font-weight: bold;
            color: var(--gold);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .table-wrapper { overflow-x: auto; }

        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { background: rgba(0,0,0,0.3); color: var(--gold); padding: 15px; text-align: right; font-size: 0.9rem; }
        td { padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }

        /* أزرار الأكشن */
        .btn-action {
            background: var(--gold); color: var(--gov-blue);
            border: none; padding: 12px; border-radius: 5px;
            font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer;
        }

        .input-style {
            width: 100%; padding: 12px; margin: 8px 0;
            background: #050c14; border: 1px solid var(--gold);
            color: white; border-radius: 5px; box-sizing: border-box;
        }

        .badge-active { color: #00ff88; font-weight: bold; }
        .badge-danger { color: #ff4655; font-weight: bold; }

    </style>
</head>
<body>

<div class="menu-icon" onclick="toggleMenu()">☰</div>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="sidebar" id="sidebar">
    <h2 style="color:var(--gold)">⚙️ لوحة التحكم</h2>
    <div id="auth-area">
        <button class="btn-action" onclick="adminLogin()">🔐 تسجيل دخول الإدارة</button>
    </div>

    <div id="admin-tools" style="display:none; margin-top:20px;">
        <p>إضافة سجل جديد:</p>
        <input type="text" id="empName" class="input-style" placeholder="اسم الموظف">
        <select id="empSector" class="input-style">
            <option value="جيش">قوات الجيش</option>
            <option value="شرطة">جهاز الشرطة</option>
            <option value="طبي">التحالف الطبي</option>
            <option value="حكومي">القطاع الحكومي</option>
        </select>
        <input type="text" id="empRank" class="input-style" placeholder="الرتبة">
        <select id="empStatus" class="input-style">
            <option value="نشط">نشط</option>
            <option value="فصل">فصل</option>
            <option value="استقالة">استقالة</option>
        </select>
        <button class="btn-action" onclick="pushToDB()">اعتماد القرار</button>
        <hr style="border-color:var(--gold); margin:20px 0;">
        <button class="btn-action" style="background:#ff4655; color:white" onclick="addSector()">📂 فتح خانة قطاع جديد</button>
    </div>

    <div style="margin-top:30px;">
        <p>🎧 الدعم الفني:</p>
        <div id="chat-box" style="height:150px; background:#000; overflow-y:auto; padding:10px; font-size:12px; border:1px solid var(--gold)"></div>
        <input type="text" id="chatMsg" class="input-style" placeholder="اكتب ردك...">
        <button class="btn-action" onclick="sendSupport()">إرسال</button>
    </div>
</div>

<header>
    <div class="hr-main-logo">𝓗𝓡</div>
    <div class="gov-title">وزارة الموارد البشرية | ASMAR | ⚖️</div>
</header>

<div class="container">
    <div id="dynamic-sectors">
        <div class="section-box">
            <div class="section-header">🎖️ كشوفات الجيش</div>
            <div class="table-wrapper">
                <table id="t-جيش"><thead><tr><th>الاسم</th><th>الرتبة</th><th>الحالة</th><th>التاريخ</th></tr></thead><tbody></tbody></table>
            </div>
        </div>

        <div class="section-box">
            <div class="section-header">🚔 جهاز الشرطة</div>
            <div class="table-wrapper">
                <table id="t-شرطة"><thead><tr><th>الاسم</th><th>الرتبة</th><th>الحالة</th><th>التاريخ</th></tr></thead><tbody></tbody></table>
            </div>
        </div>

        <div class="section-box">
            <div class="section-header">🏥 التحالف الطبي</div>
            <div class="table-wrapper">
                <table id="t-طبي"><thead><tr><th>الاسم</th><th>الرتبة</th><th>الحالة</th><th>التاريخ</th></tr></thead><tbody></tbody></table>
            </div>
        </div>
    </div>

    <div class="section-box" style="border-color: #ff4655;">
        <div class="section-header" style="color:#ff4655">🚫 القائمة السوداء (Blacklist)</div>
        <div class="table-wrapper">
            <table id="t-blacklist"><thead><tr><th>الاسم</th><th>القطاع</th><th>الحالة</th><th>التاريخ</th></tr></thead><tbody></tbody></table>
        </div>
    </div>
</div>

<script>
    // إعدادات Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDP8F9r4h7pzhl3FV9-eR-6uC9R4W80mE",
        databaseURL: "https://hr-asmar-default-rtdb.firebaseio.com",
        projectId: "hr-asmar"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let isAdmin = false;

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function adminLogin() {
        const pass = prompt("رمز الدخول الإداري:");
        if(pass === "asmar123") {
            isAdmin = true;
            document.getElementById('admin-tools').style.display = 'block';
            document.getElementById('auth-area').innerHTML = "<p style='color:#00ff88'>✅ تم تسجيل الدخول: أسمر</p>";
        }
    }

    function pushToDB() {
        const data = {
            name: document.getElementById('empName').value,
            sector: document.getElementById('empSector').value,
            rank: document.getElementById('empRank').value,
            status: document.getElementById('empStatus').value,
            date: new Date().toLocaleDateString()
        };
        db.ref('GOV_V8/RECORDS').push(data);
        alert("تم الحفظ بنجاح");
    }

    // جلب البيانات وتوزيعها على الجداول
    db.ref('GOV_V8/RECORDS').on('value', snap => {
        const tables = document.querySelectorAll('tbody');
        tables.forEach(t => t.innerHTML = "");
        
        snap.forEach(child => {
            const v = child.val();
            const badgeClass = v.status === 'نشط' ? 'badge-active' : 'badge-danger';
            const deleteBtn = isAdmin ? `<button onclick="db.ref('GOV_V8/RECORDS/${child.key}').remove()" style="background:none; border:none; color:red; cursor:pointer">🗑️</button>` : '';
            
            const row = `<tr><td>${v.name}</td><td>${v.rank}</td><td><span class="${badgeClass}">${v.status}</span></td><td>${v.date} ${deleteBtn}</td></tr>`;
            
            if(v.status === 'نشط') {
                const target = document.querySelector(`#t-${v.sector} tbody`);
                if(target) target.innerHTML += row;
            } else {
                document.querySelector('#t-blacklist tbody').innerHTML += `<tr><td>${v.name}</td><td>${v.sector}</td><td><span class="badge-danger">${v.status}</span></td><td>${v.date} ${deleteBtn}</td></tr>`;
            }
        });
    });

    // الدعم الفني
    function sendSupport() {
        const m = document.getElementById('chatMsg').value;
        if(m) {
            db.ref('GOV_V8/SUPPORT').push({ sender: isAdmin ? "الإدارة" : "زائر", msg: m });
            document.getElementById('chatMsg').value = "";
        }
    }
    db.ref('GOV_V8/SUPPORT').limitToLast(10).on('value', snap => {
        const box = document.getElementById('chat-box'); box.innerHTML = "";
        snap.forEach(c => {
            const d = c.val();
            box.innerHTML += `<div><b style="color:var(--gold)">${d.sender}:</b> ${d.msg}</div>`;
        });
        box.scrollTop = box.scrollHeight;
    });
</script>
</body>
</html>
