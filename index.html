<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR ASMAR | وزارة الموارد البشرية </title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --primary-green: #2d6a4f;
            --main-blue: #1b263b;
            --bg-gray: #f4f7f6;
            --white: #ffffff;
            --danger: #bc4749;
            --gold: #d4af37;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-gray); margin: 0; }

        header { 
            background: var(--white); 
            padding: 15px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
            position: sticky; top: 0; z-index: 1000;
        }

        .hr-logo { font-size: 28px; font-weight: 900; color: var(--main-blue); letter-spacing: 2px; }
        .hr-logo span { color: var(--primary-green); }

        .gov-logo { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary-green); }

        .sidebar { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: var(--main-blue); color: white; transition: 0.4s; z-index: 2000; padding-top: 30px; }
        .sidebar.active { right: 0; }
        .sidebar a { padding: 15px 25px; display: block; color: #cbd5e0; text-decoration: none; border-bottom: 1px solid #2d3748; }

        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        
        .main-card { 
            background: var(--white); 
            border-radius: 20px; 
            padding: 25px; 
            margin-bottom: 25px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .section-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }

        .stat-card { background: var(--white); border-radius: 15px; padding: 20px; border-top: 5px solid var(--primary-green); position: relative; }
        .stat-card.red { border-top-color: var(--danger); }

        /* لوحة التحكم */
        #adminPanel { display: none; background: #f8fafc; border: 2px dashed #cbd5e0; }
        .admin-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .input-box { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #e2e8f0; box-sizing: border-box; }
        .full-width { grid-column: span 2; }
        .btn-post { background: var(--primary-green); color: white; padding: 15px; border: none; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; }

        /* عرض الأسماء والرتب */
        .name-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f1f5f9; align-items: center; }
        .rank-tag { color: var(--gold); font-weight: bold; font-size: 0.85em; margin-left: 8px; border: 1px solid var(--gold); padding: 2px 6px; border-radius: 4px; }
        .emp-name { color: var(--main-blue); font-weight: 500; }
        .date-badge { font-size: 11px; color: #94a3b8; }

        .support-fab { position: fixed; bottom: 20px; left: 20px; background: #25d366; color: white; padding: 15px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.2); z-index: 1000; }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div style="text-align:center; margin-bottom: 20px;">
        <img src="https://i.ibb.co/vzN4L0f/image.png" class="gov-logo">
        <p>بوابة Asmar الإدارية</p>
    </div>
    <a href="#" onclick="toggleMenu()">🏠 الرئيسية</a>
    <a href="#" onclick="openLogin()">🔐 دخول الآدمن</a>
    <a href="https://wa.me/9660000000" target="_blank">💬 الدعم الفني</a>
</div>

<header>
    <div onclick="toggleMenu()" style="font-size: 24px; cursor: pointer;">☰</div>
    <div class="hr-logo">𝓗𝓡 <span>𝓐𝓼𝓶𝓪𝓻</span></div>
    <img src="https://i.ibb.co/vzN4L0f/image.png" class="gov-logo">
</header>

<div class="container">
    <div id="adminPanel" class="main-card">
        <h3 style="margin-top:0; color:var(--primary-green);">🛠️ إضافة موظف جديد برتبة</h3>
        <div class="admin-inputs">
            <input type="text" id="nameInp" class="input-box" placeholder="الاسم الكامل">
            <input type="text" id="rankInp" class="input-box" placeholder="الرتبة (مثال: نقيب / دكتور)">
            <select id="sectorInp" class="input-box full-width">
                <option value="gov">🏛️ القطاع الحكومي</option>
                <option value="army">🎖️ القوات المسلحة</option>
                <option value="medical">🏥 التحالف الطبي</option>
                <option value="blacklist">🚫 البلاك ليست</option>
                <option value="resigned">📄 استقالة</option>
                <option value="cool">⏳ فترة تهدئة</option>
            </select>
        </div>
        <button class="btn-post" onclick="saveData()">إضافة السجل الآن ✅</button>
    </div>

    <div class="section-grid">
        <div class="stat-card"><h4>🏛️ القطاع الحكومي</h4><div id="list-gov"></div></div>
        <div class="stat-card"><h4>🎖️ القوات المسلحة</h4><div id="list-army"></div></div>
        <div class="stat-card"><h4>🏥 التحالف الطبي</h4><div id="list-medical"></div></div>
        <div class="stat-card red"><h4>🚫 البلاك ليست</h4><div id="list-blacklist"></div></div>
        <div class="stat-card"><h4>📄 طلبات الاستقالة</h4><div id="list-resigned"></div></div>
        <div class="stat-card"><h4>⏳ فترة التهدئة</h4><div id="list-cool"></div></div>
    </div>
</div>

<a href="https://wa.me/9660000000" class="support-fab">تحدث مع الدعم 💬</a>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDP8F9r4h7pzhl3FV9-eR-6uC9R4W80mE",
        authDomain: "hr-asmar.firebaseapp.com",
        databaseURL: "https://hr-asmar-default-rtdb.firebaseio.com",
        projectId: "hr-asmar",
        storageBucket: "hr-asmar.firebasestorage.app",
        messagingSenderId: "642339321351",
        appId: "1:642339321351:web:28780333d7b819f798ec4b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let isRoot = false;

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }

    function openLogin() {
        let p = prompt("كلمة مرور الإدارة الشاملة:");
        if(p === "asmar123") {
            isRoot = true;
            document.getElementById('adminPanel').style.display = 'block';
            alert("مرحباً بك يا مدير Asmar. تم تفعيل صلاحيات التعديل.");
            toggleMenu();
            render();
        }
    }

    function saveData() {
        const name = document.getElementById('nameInp').value;
        const rank = document.getElementById('rankInp').value;
        const sector = document.getElementById('sectorInp').value;
        if(name && rank) {
            db.ref('hr_system/').push({ 
                name: name, 
                rank: rank, 
                sector: sector, 
                date: new Date().toLocaleDateString('ar-SA') 
            });
            document.getElementById('nameInp').value = "";
            document.getElementById('rankInp').value = "";
        } else {
            alert("يرجى كتابة الاسم والرتبة معاً!");
        }
    }

    db.ref('hr_system/').on('value', (s) => { render(s.val()); });

    function render(data) {
        const sectors = ['gov','army','medical','blacklist','resigned', 'cool'];
        sectors.forEach(s => document.getElementById(`list-${s}`).innerHTML = "");
        if(!data) return;
        for(let id in data) {
            const item = data[id];
            const div = document.createElement('div');
            div.className = 'name-row';
            div.innerHTML = `
                <div>
                    <span class="rank-tag">${item.rank}</span>
                    <span class="emp-name">${item.name}</span>
                </div>
                <div>
                    <span class="date-badge">${item.date}</span>
                    ${isRoot ? `<span onclick="db.ref('hr_system/${id}').remove()" style="color:red; cursor:pointer; margin-right:10px;">🗑️</span>` : ''}
                </div>
            `;
            if(document.getElementById(`list-${item.sector}`)) {
                document.getElementById(`list-${item.sector}`).appendChild(div);
            }
        }
    }
</script>
</body>
</html>
