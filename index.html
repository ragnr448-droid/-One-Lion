<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وزارة الموارد البشرية - بوابة التقييم</title>
    <style>
        :root { --primary: #0b1a30; --gold: #c5a059; --bg: #f8f9fa; --success: #28a745; --danger: #dc3545; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; color: #333; }
        
        /* الهيدر بنفس نمط الصورة */
        header { background: var(--primary); color: white; padding: 30px 20px; text-align: right; border-bottom: 4px solid var(--gold); }
        header h1 { margin: 0; font-size: 24px; }
        header p { margin: 5px 0 0; color: var(--gold); font-size: 14px; }

        .container { max-width: 800px; margin: -30px auto 40px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        /* بطاقات المعلومات (نفس الصورة الأولى) */
        .info-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .card { border: 1px solid #eee; padding: 15px; text-align: center; border-radius: 10px; }
        .card h2 { margin: 0; color: var(--gold); font-size: 28px; }
        .card p { margin: 5px 0 0; font-size: 12px; color: #777; }

        .form-section { border-top: 1px solid #eee; padding-top: 20px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; background: #fafafa; }
        .btn { background: var(--gold); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #b08d4a; }

        /* جدول الناجحين والراسبين */
        .results-section { margin-top: 40px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; border-radius: 10px; overflow: hidden; }
        th { background: var(--primary); color: white; padding: 12px; text-align: center; }
        td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; }
        .status-pass { color: var(--success); font-weight: bold; }
        .status-fail { color: var(--danger); font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div style="max-width: 800px; margin: 0 auto;">
        <h1>وزارة الموارد البشرية</h1>
        <p>نظام الاختبارات المهنية - العدالة أساس العمل</p>
    </div>
</header>

<div class="container">
    <div class="info-cards">
        <div class="card"><h2>10</h2><p>عدد الأسئلة</p></div>
        <div class="card"><h2>70</h2><p>درجة النجاح</p></div>
        <div class="card"><h2>100</h2><p>الدرجة الكلية</p></div>
        <div class="card" id="passedCount"><h2>0</h2><p>عدد الناجحين</p></div>
    </div>

    <div class="form-section">
        <h3>بيانات المتقدم للاختبار</h3>
        <input type="text" id="userName" placeholder="الاسم الكامل كما في الهوية *">
        <input type="number" id="userId" placeholder="رقم الهوية الوطنية *">
        
        <div id="questionsArea">
            </div>

        <button class="btn" onclick="submitTest()">إرسال الإجابات للمراجعة</button>
    </div>

    <div class="results-section">
        <h3 style="border-right: 4px solid var(--gold); padding-right: 10px;">قائمة النتائج النهائية</h3>
        <table>
            <thead>
                <tr>
                    <th>اسم المتقدم</th>
                    <th>الدرجة</th>
                    <th>الحالة</th>
                </tr>
            </thead>
            <tbody id="resultsTableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    const questions = ["تحدث عن خبراتك؟", "لماذا الوزارة؟", "كيف تحل المشكلات؟", "نقاط قوتك؟", "العمل تحت الضغط؟", "رؤية 2030؟", "التعامل مع الجمهور؟", "إدارة الوقت؟", "أهدافك المهنية؟", "الإبداع في العمل؟"];
    
    // إنشاء الأسئلة
    const qArea = document.getElementById('questionsArea');
    questions.forEach((q, i) => {
        qArea.innerHTML += `<p><strong>س${i+1}:</strong> ${q}</p><textarea id="q${i}" placeholder="اكتب إجابتك هنا..."></textarea>`;
    });

    function submitTest() {
        const name = document.getElementById('userName').value;
        const id = document.getElementById('userId').value;
        
        if(!name || !id) return alert("الرجاء إكمال البيانات الأساسية");

        const newSubmission = {
            name: name,
            id: id,
            answers: questions.map((_, i) => document.getElementById(`q${i}`).value),
            score: null, // لم يتم التقييم بعد
            status: "قيد الانتظار"
        };

        let data = JSON.parse(localStorage.getItem('submissions') || '[]');
        data.push(newSubmission);
        localStorage.setItem('submissions', JSON.stringify(data));
        
        alert("تم الإرسال. انتظر قرار لجنة المحاورين.");
        location.reload();
    }

    // عرض النتائج في الجدول
    function loadResults() {
        const data = JSON.parse(localStorage.getItem('submissions') || '[]');
        const tableBody = document.getElementById('resultsTableBody');
        let passCount = 0;

        tableBody.innerHTML = data.map(item => {
            if (item.score === null) return ""; // لا تظهر من لم يُقيم بعد
            
            const isPass = item.score >= 70;
            if(isPass) passCount++;

            return `
                <tr>
                    <td>${item.name}</td>
                    <td>${item.score}</td>
                    <td class="${isPass ? 'status-pass' : 'status-fail'}">${isPass ? 'ناجح ✅' : 'راسب ❌'}</td>
                </tr>
            `;
        }).join('');

        document.getElementById('passedCount').innerHTML = `<h2>${passCount}</h2><p>عدد الناجحين</p>`;
    }

    loadResults();
</script>

</body>
</html>
